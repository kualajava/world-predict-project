<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Project | Phase 4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .popup-content { font-family: sans-serif; text-align: center; color: #333; min-width: 150px; }
        .popup-flag { font-size: 50px; margin-bottom: 5px; }
        #version-tag { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #555; padding: 3px 8px; font-family: monospace; font-size: 10px; border-radius: 4px; z-index: 1000; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="version-tag">v1.0.6 - Live API Integration</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([25, 0], 2.3);
    let worldData = {};

    // 1. FETCH LIVE DATA (Population, Currency, Flags)
    fetch('https://restcountries.com/v3.1/all?fields=name,cca3,flags,population,currencies')
        .then(res => res.json())
        .then(data => {
            // Organize data by country code for fast lookup
            data.forEach(c => { worldData[c.cca3] = c; });
            loadMap(); // Only load the map once we have the data
        });

    function loadMap() {
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(res => res.json())
            .then(geoData => {
                L.geoJSON(geoData, {
                    style: { fillColor: "#1a1f26", weight: 1, color: '#4a5568', fillOpacity: 0.7 },
                    onEachFeature: function (feature, layer) {
                        const code = feature.properties.iso_a3;
                        const live = worldData[code];

                        layer.on('click', () => {
                            if (live) {
                                const population = live.population.toLocaleString();
                                const currency = Object.keys(live.currencies)[0];
                                
                                layer.bindPopup(`
                                    <div class="popup-content">
                                        <div class="popup-flag"><img src="${live.flags.png}" width="80"></div>
                                        <h2>${live.name.common}</h2>
                                        <p>👥 Pop: <strong>${population}</strong></p>
                                        <p>💰 Currency: <strong>${currency}</strong></p>
                                        <p>⚠️ Leader data loading...</p>
                                    </div>
                                `).openPopup();
                            }
                        });

                        layer.on({
                            mouseover: (e) => e.target.setStyle({ fillOpacity: 1, fillColor: "#3182ce" }),
                            mouseout: (e) => e.target.setStyle({ fillColor: "#1a1f26", fillOpacity: 0.7 })
                        });
                    }
                }).addTo(map);
            });
    }
</script>
</body>
</html>

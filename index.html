<style>
    body { margin: 0; padding: 0; background: #0b0e14; overflow: hidden; }
    #map { height: 100vh; width: 100vw; background: #05070a; }

    /* Compact Popup Styling */
    .leaflet-popup-content-wrapper {
        background: rgba(15, 20, 28, 0.98) !important;
        color: #fff !important;
        border-radius: 8px !important;
        border: 1px solid rgba(79, 209, 197, 0.2);
        box-shadow: 0 4px 15px rgba(0,0,0,0.6) !important;
    }
    .leaflet-popup-content {
        margin: 0 !important;
        width: 220px !important; /* Narrower box */
    }

    /* Flexbox Layout */
    .db-mini-card { padding: 10px; font-family: 'Inter', sans-serif; }
    
    /* Top Row: Flag Left, Text Right */
    .db-top-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .db-flag { width: 45px; height: 30px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
    .db-main-info { display: flex; flex-direction: column; overflow: hidden; }
    
    .db-country { font-size: 14px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .db-leader { font-size: 12px; color: #4fd1c5; font-weight: 500; margin-top: 2px; }

    /* Bottom Row: Population */
    .db-bottom-row { 
        border-top: 1px solid rgba(255,255,255,0.1); 
        padding-top: 6px; 
        display: flex; justify-content: space-between; align-items: center;
    }
    .db-label { font-size: 9px; color: #8a94a6; text-transform: uppercase; letter-spacing: 0.5px; }
    .db-value { font-size: 11px; color: #cbd5e0; font-weight: 600; }

    #version-tag { 
        position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); 
        color: #4fd1c5; padding: 4px 10px; font-family: monospace; font-size: 10px; 
        border-radius: 6px; z-index: 1000; border: 1px solid rgba(79, 209, 197, 0.3); 
    }
</style>

<script>
    // ... within your loop ...
    layer.bindPopup(`
        <div class="db-mini-card">
            <div class="db-top-row">
                <img src="${live.flags.png}" class="db-flag">
                <div class="db-main-info">
                    <h2 class="db-country">${live.name.common}</h2>
                    <span class="db-leader">${leaderName}</span>
                </div>
            </div>
            <div class="db-bottom-row">
                <span class="db-label">Population</span>
                <span class="db-value">${pop}</span>
            </div>
        </div>
    `, { maxWidth: 250, closeButton: false }).openPopup();
</script>

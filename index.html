<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.2.7</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #aad3df; }

        /* Map Badge Style */
        .intel-badge {
            background: #f6e05e; border: 2px solid #000; border-radius: 50%;
            color: #000; font-weight: 900; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.3); pointer-events: auto;
        }

        /* Right Hover Card (Restored) */
        #hover-card { 
            position: fixed; top: 20px; right: 20px; z-index: 9999; 
            background: white; padding: 15px; border-radius: 12px; 
            display: none; width: 240px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            pointer-events: none; border: 1px solid #eee; 
        }

        /* Left Intelligence Panel */
        #intel-panel {
            position: fixed; top: 80px; left: 20px; z-index: 9999;
            width: 340px; max-height: 75vh;
            background: rgba(15, 23, 42, 0.98); border-radius: 12px; border: 1px solid #334155;
            color: white; display: none; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .intel-header { padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .pred-box { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .pred-meta { font-size: 10px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .pred-cat { color: #68d391; font-weight: bold; background: rgba(104,211,145,0.1); padding: 2px 6px; border-radius: 4px; }
        .pred-text { font-size: 13px; line-height: 1.6; color: #f1f5f9; }

        #log { position: fixed; bottom: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.8); color: #00ff00; padding: 5px 10px; font-size: 10px; border-radius: 4px; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>

<div id="log">Status: Initializing...</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <img src="" id="card-flag" style="width:40px; border:1px solid #eee; border-radius: 3px;">
        <b id="card-name" style="font-size:16px; color:#1a202c;"></b>
    </div>
    <div style="font-size:13px; margin-bottom:4px;">
        <span style="color:#64748b; font-weight:600;">Leader:</span> 
        <span id="card-leader" style="color:#3182ce; font-weight:700;"></span>
    </div>
    <div style="font-size:13px;">
        <span style="color:#64748b; font-weight:600;">Population:</span> 
        <span id="card-pop" style="color:#1a202c; font-weight:600;"></span>
    </div>
</div>

<div id="intel-panel">
    <div class="intel-header">
        <span id="intel-title" style="color:#f6e05e; font-weight:800; font-size:12px; text-transform:uppercase;">Intel Feed</span>
        <button onclick="closeIntel()" style="background:rgba(255,255,255,0.1); border:none; color:white; cursor:pointer; width:26px; height:26px; border-radius:50%;">✕</button>
    </div>
    <div id="intel-body"></div>
</div>

<div id="map"></div>

<script>
    const logger = document.getElementById('log');
    function log(msg) { logger.innerText = "Status: " + msg; }

    let predictions = [], worldData = {}, leaderData = {}, isLocked = false;
    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    async function start() {
        const ts = new Date().getTime();
        try {
            // 1. Fetch Countries + Population
            const apiRes = await fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,region,population`).then(r => r.json());
            apiRes.forEach(c => worldData[c.cca3] = c);
            log("Atlas: Geography Cached");

            // 2. Load Leaders
            fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(txt => {
                txt.split('\n').slice(1).forEach(row => {
                    const p = row.split(',');
                    if(p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
                });
            }).catch(() => {});

            // 3. Load Predictions
            const csvText = await fetch(`predictions.csv?v=${ts}`).then(r => r.ok ? r.text() : "");
            if (csvText) {
                const lines = csvText.split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((h, i) => obj[h] = values[i]?.replace(/"/g, '').trim() || "");
                    return obj;
                });
                log(`Atlas: ${predictions.length} Entries Loaded`);
            }

            loadGeo();
        } catch (e) { log("Error: " + e.message); }
    }

    function loadGeo() {
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(r => r.json()).then(geo => {
                L.geoJSON(geo, {
                    style: (f) => {
                        const colors = { 'Africa': '#f6ad55', 'Americas': '#68d391', 'Asia': '#fc8181', 'Europe': '#63b3ed', 'Oceania': '#f6e05e' };
                        const reg = worldData[f.properties.iso_a3]?.region;
                        return { fillColor: colors[reg] || '#cbd5e0', weight: 1, color: "white", fillOpacity: 0.6 };
                    },
                    onEachFeature: (f, layer) => {
                        const name = f.properties.name;
                        const code = f.properties.iso_a3;

                        // Filtering logic
                        const matches = predictions.filter(p => {
                            const cField = (p["Country/Region"] || "").toLowerCase();
                            const mName = name.toLowerCase();
                            if ((mName.includes("united states") || mName === "usa") && (cField.includes("usa") || cField.includes("united states"))) return true;
                            return cField.includes(mName) || mName.includes(cField);
                        });

                        // Place Badge
                        if (matches.length > 0) {
                            try {
                                const center = layer.getBounds().getCenter();
                                L.marker(center, {
                                    icon: L.divIcon({
                                        className: '',
                                        html: `<div class="intel-badge">${matches.length}</div>`,
                                        iconSize: [22, 22]
                                    })
                                }).addTo(map).on('click', (e) => {
                                    L.DomEvent.stopPropagation(e);
                                    isLocked = true;
                                    showIntel(name, matches, code);
                                });
                            } catch(e) {}
                        }

                        layer.on({
                            mouseover: () => { 
                                updateHoverCard(name, code);
                                if(!isLocked) showIntel(name, matches, code, false);
                            },
                            mouseout: () => { 
                                if(!isLocked) {
                                    document.getElementById('hover-card').

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.3.2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #aad3df; }

        /* Status Bar - Bottom Left */
        #log { position: fixed; bottom: 15px; left: 15px; z-index: 9999; background: rgba(0,0,0,0.85); color: #4ade80; padding: 6px 12px; font-size: 11px; border-radius: 4px; font-family: monospace; border: 1px solid #334155; pointer-events: none; }

        /* Badge Style */
        .intel-badge {
            background: #f6e05e; border: 2px solid #000; border-radius: 50%;
            color: #000; font-weight: 900; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        /* Hover Card (Right) */
        #hover-card { 
            position: fixed; top: 20px; right: 20px; z-index: 9999; background: white; 
            padding: 15px; border-radius: 10px; display: none; width: 240px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: none; border: 1px solid #ddd; 
        }

        /* Intelligence Feed (Left) */
        #intel-panel {
            position: fixed; top: 80px; left: 20px; z-index: 9999;
            width: 340px; max-height: 75vh;
            background: rgba(15, 23, 42, 0.98); border-radius: 12px; border: 1px solid #334155;
            color: white; display: none; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .intel-header { padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .pred-box { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .pred-meta { font-size: 10px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .pred-cat { color: #68d391; font-weight: bold; background: rgba(104,211,145,0.1); padding: 2px 6px; border-radius: 4px; }
        .pred-text { font-size: 13px; line-height: 1.6; color: #f1f5f9; }
    </style>
</head>
<body>

<div id="log">Status: Loading Engine...</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <img src="" id="card-flag" style="width:40px; border:1px solid #eee; display:none;">
        <b id="card-name" style="font-size:16px; color:#1a202c;"></b>
    </div>
    <div style="font-size:12px; margin-bottom:4px;"><span style="color:#64748b; font-weight:600;">Leader:</span> <span id="card-leader" style="color:#3182ce; font-weight:700;"></span></div>
    <div style="font-size:12px;"><span style="color:#64748b; font-weight:600;">Population:</span> <span id="card-pop" style="color:#1a202c; font-weight:600;"></span></div>
</div>

<div id="intel-panel">
    <div class="intel-header">
        <span id="intel-title" style="color:#f6e05e; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:0.5px;">Intelligence Feed</span>
        <button onclick="closeIntel()" style="background:rgba(255,255,255,0.1); border:none; color:white; cursor:pointer; width:26px; height:26px; border-radius:50%;">✕</button>
    </div>
    <div id="intel-body"></div>
</div>

<div id="map"></div>

<script>
    // 1. Setup Status Logger
    const logger = document.getElementById('log');
    const updateLog = (m) => { if(logger) logger.innerText = "Status: " + m; };

    // 2

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v1.2.6</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        /* Force container to fill Mac browser window */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #001529; overflow: hidden; }
        #map { height: 100vh; width: 100vw; position: absolute; top:0; left:0; background: #aad3df; }

        /* Search Bar Optimized for Mac Retina Displays */
        #search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; }
        #search-input { 
            width: 100%; padding: 14px 20px; border-radius: 25px; 
            border: 1px solid #3182ce; background: rgba(255,255,255,0.95);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); outline: none; font-size: 16px;
            -webkit-appearance: none; /* Safari Fix */
        }

        #status-bar { position: absolute; bottom: 20px; left: 20px; z-index: 9999; background: #000; color: #00ff00; padding: 6px 12px; font-family: 'Courier New', monospace; font-size: 11px; border-radius: 4px; opacity: 0.9; }
    </style>
</head>
<body>

<div id="status-bar">Mac Diagnostic: Booting...</div>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Search Country, Leader, or Ocean...">
</div>

<div id="map"></div>

<script>
    const status = document.getElementById('status-bar');
    const setStatus = (msg) => { status.innerText = `Mac Diagnostic: ${msg}`; console.log(msg); };

    // 2. Start Map Immediately (Don't wait for data)
    function startAtlas() {
        try {
            setStatus("Initializing Map Engine...");
            
            const map = L.map('map', {
                zoomSnap: 0.1,
                attributionControl: false,
                trackResize: true
            }).setView([20, 0], 2.3);

            // 3. THE "ALL-IN-ONE" LAYER: High compatibility for Safari
            // This contains Ocean Names, Country Labels, and Rivers
            const tiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                crossOrigin: true // Critical for Mac local file testing
            }).addTo(map);

            tiles.on('tileload', () => setStatus("Map Visible. Syncing Rivers & Oceans..."));
            tiles.on('tileerror', () => setStatus("Network Error: Tiles Blocked."));

            loadIntelligence(map);

            // Force Safari to redraw the map container
            setTimeout(() => { map.invalidateSize(); }, 500);

        } catch (e) {
            setStatus("Critical Error: " + e.message);
        }
    }

        let leaderData = {};

            ]);

            csvRes.split('\n').slice(1).forEach(row => {

                if (parts[0]) leaderData[parts[0].trim().toUpperCase()] = { name: parts[1] };
            });

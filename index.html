<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.1.9</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #aad3df; }

        /* Left Panel */
        #intel-panel {
            position: fixed; top: 85px; left: 20px; z-index: 9999;
            width: 350px; max-height: calc(100vh - 150px);
            background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
            color: white; display: none; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .intel-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: #1e293b; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; }
        .intel-title { font-size: 13px; font-weight: 800; color: #f6e05e; text-transform: uppercase; }
        #close-intel { background: rgba(255,255,255,0.1); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }

        .prediction-entry { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .pred-meta { font-size: 10px; color: #94a3b8; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .pred-cat { color: #68d391; font-weight: bold; }
        .pred-desc { font-size: 13px; line-height: 1.6; color: #f1f5f9; }

        /* UI Elements */
        #status-bar { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: rgba(0,0,0,0.8); color: #00ff00; padding: 8px 12px; font-size: 11px; border-radius: 6px; font-family: monospace; }
        #hover-card { position: fixed; top: 20px; right: 20px; z-index: 9999; width: 240px; background: white; border-radius: 12px; padding: 15px; display: none; border: 1px solid #eee; pointer-events: none; }
    </style>
</head>
<body>

<div id="status-bar">Atlas: Initializing...</div>

<div id="intel-panel">
    <div class="intel-header">
        <div class="intel-title" id="intel-country-name">Intelligence</div>
        <button id="close-intel">✕</button>
    </div>
    <div id="intel-content"></div>
</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <img src="" id="flag" style="width:35px; height:24px; border:1px solid #ddd;">
        <h2 id="name" style="font-size:16px; margin:0;"></h2>
    </div>
    <div style="font-size:10px; color:gray;">LEADER</div>
    <div id="leader" style="font-size:14px; font-weight:bold; color:#3182ce;"></div>
</div>

<div id="map"></div>

<script>
    const statusText = document.getElementById('status-bar');
    const card = document.getElementById('hover-card');
    const intelPanel = document.getElementById('intel-panel');
    const intelContent = document.getElementById('intel-content');
    const intelTitle = document.getElementById('intel-country-name');
    
    let worldData = {}, leaderData = {}, predictions = [], isLocked = false;
    let geoLayer;

    // 1. INSTANT MAP BOOT
    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    // Color Logic
    function getCountryStyle(feature) {
        const colors = { 'Africa': '#f6ad55', 'Americas': '#68d391', 'Asia': '#fc8181', 'Europe': '#63b3ed', 'Oceania': '#f6e05e' };
        const region = worldData[feature.properties.iso_a3]?.region;
        return {
            fillColor: colors[region] || '#cbd5e0', 
            weight: 1, 
            color: "white", 
            fillOpacity: 0.6 
        };
    }

    async function startAtlas() {
        const ts = new Date().getTime();
        
        // Load API Data (Region/Flags)
        try {
            const r = await fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,region`);
            const data = await r.json();
            data.forEach(c => worldData[c.cca3] = c);
            // TRIGGER REDRAW once we have region colors
            if(geoLayer) geoLayer.setStyle(getCountryStyle);
        } catch(e) { console.log("API Fail"); }

        // Load Leaders
        fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(txt => {
            txt.split('\n').slice(1).forEach(row => {
                const p = row.split(',');
                if(p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
            });
        }).catch(() => console.log("CSV Leaders Fail"));

        // Load Predictions
        fetch(`predictions.csv?v=${ts}`).then(r => r.text()).then(txt => {
            const lines = txt.split('\n');
            const headers = lines[0].split(',');
            predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                headers.forEach((h, i) => obj[h.trim()] = values[i]?.replace(/"/g, '').trim() || "");
                return obj;
            });
        }).catch(() => console.log("CSV Predictions Fail"));

        // Load GeoJSON
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(r => r.json()).then(geo => {
                geoLayer = L.geoJSON(geo, {
                    style: getCountryStyle,
                    onEachFeature: (f, l) => {
                        l.on({
                            mouseover: () => { if(!isLocked) updateUI(f.properties.iso_a3, f.properties.name); },
                            mouseout: () => { if(!isLocked) { card.style.display = 'none'; intelPanel.style.display = 'none'; }},
                            click: (e) => { isLocked = true; updateUI(f.properties.iso_a3, f.properties.name); L.DomEvent.stopPropagation(e); }
                        });
                    }
                }).addTo(map);
                statusText.innerText = "Atlas: Operational";
            });
    }

    function updateUI(code, mapName) {
        const d = worldData[code];
        if (d) {
            document.getElementById('name').innerText = d.name.common;
            document.getElementById('leader').innerText = leaderData[code]?.name || "N/A";
            document.getElementById('flag').src = d.flags.png;
            card.style.display = 'block';
        }

        const m = mapName.toLowerCase();
        const filtered = predictions.filter(p => {
            const c = (p["Country/Region"] || "").toLowerCase();
            return c.includes(m) || m.includes(c) || (m.includes("united states") && c.includes("usa"));
        });

        if (filtered.length > 0) {
            intelTitle.innerText = `${mapName} Insights`;
            intelContent.innerHTML = filtered.map(p => `
                <div class="prediction-entry">
                    <div class="pred-meta"><span>${p["Date of Premonition"]}</span><span class="pred-cat">${p["Meta Data"]}</span></div>
                    <div class="pred-desc">${p["Prediction Description"]}</div>
                </div>
            `).join('');
            intelPanel.style.display = 'block';
        } else if (!isLocked) { intelPanel.style.display = 'none'; }
    }

    map.on('click', () => {
        isLocked = true;
        const global = predictions.filter(p => (p["Country/Region"] || "").toLowerCase().includes("global"));
        intelTitle.innerText = "Global Intelligence";
        intelContent.innerHTML = global.map(p => `<div class="prediction-entry"><div class="pred-meta"><span>${p["Date of Premonition"]}</span><span class="pred-cat">${p["Meta Data"]}</span></div><div class="pred-desc">${p["Prediction Description"]}</div></div>`).join('');
        intelPanel.style.display = 'block';
    });

    document.getElementById('close-intel').onclick = () => { isLocked = false; intelPanel.style.display = 'none'; card.style.display = 'none'; };

    startAtlas();
</script>
</body>
</html>

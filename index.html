<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Atlas | v2.7.4</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #020617; overflow: hidden; font-family: -apple-system, sans-serif; }
        #map { position: absolute; top: 32px; bottom: 0; left: 0; right: 0; z-index: 1; background: #020617; }
        #ticker-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 32px; background: #0f172a; border-bottom: 1px solid #334155; z-index: 10010; overflow: hidden; display: flex; align-items: center; }
        #ticker-label { background: #ef4444; color: white; padding: 0 15px; height: 100%; display: flex; align-items: center; font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 10011; }
        #ticker-container { flex-grow: 1; overflow: hidden; position: relative; height: 100%; display: flex; align-items: center; }
        #ticker-content { white-space: nowrap; position: absolute; left: 0; will-change: transform; transform: translate3d(0,0,0); color: #94a3b8; font-size: 11px; }
        .ticker-item { display: inline-block; margin-right: 60px; cursor: pointer; }
        #log { position: fixed; bottom: 20px; left: 20px; z-index: 10002; background: #000; color: #4ade80; padding: 8px 15px; font-size: 11px; border-radius: 5px; font-family: monospace; border: 1px solid #334155; }
        #hover-card { position: fixed; top: 85px; right: 15px; z-index: 9999; background: white; padding: 15px; border-radius: 12px; display: none; width: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #intel-panel { position: fixed; top: 85px; left: 15px; z-index: 10005; width: 340px; max-height: 70vh; background: rgba(15, 23, 42, 0.98); border-radius: 12px; border: 1px solid #475569; color: white; display: none; overflow: hidden; flex-direction: column; }
        .intel-header { padding: 15px; background: #1e293b; border-bottom: 1px solid #475569; display: flex; justify-content: space-between; align-items: center; }
        .intel-badge { border: 2px solid #000; border-radius: 50%; color: #000; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .pulse-red { animation: badge-pulse 1.8s infinite; background: #ef4444 !important; color: white !important; }
        @keyframes badge-pulse { 0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.7); } 100% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } }
        .pred-box { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .pred-text { font-size: 14px; line-height: 1.6; color: #f1f5f9; }
    </style>
</head>
<body>

<div id="ticker-wrap">
    <div id="ticker-label">Live Feed</div>
    <div id="ticker-container"><div id="ticker-content"></div></div>
</div>

<div id="log">Status: Waiting for Leaflet...</div>
<div id="map"></div>

<div id="hover-card"></div>
<div id="intel-panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    const lb = document.getElementById('log');
    let map, geoLayer, isLocked = false;
    let predictions = [], worldData = {}, tickerPos = 0, isPaused = false;

    // Library Watcher: Prevents crash if scripts load slowly
    function checkLibrary() {
        if (window.L && window.L.map) {
            lb.innerText = "Status: Initializing Map...";
            initMap();
        } else {
            setTimeout(checkLibrary, 100);
        }
    }

    window.onload = checkLibrary;

    function initMap() {
        try {
            const lat = localStorage.getItem('map_lat') || 20;
            const lng = localStorage.getItem('map_lng') || 0;
            const zoom = localStorage.getItem('map_zoom') || 2.2;

            map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([lat, lng], zoom);
            
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 8 }).addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);

            lb.innerText = "Status: Loading Geodata...";
            loadGeography();
        } catch(e) { 
            lb.innerText = "Status: CRITICAL_MAP_FAIL"; 
            console.error(e);
        }
    }

    function loadGeography() {
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(r => r.json())
            .then(geo => {
                geoLayer = L.geoJSON(geo, {
                    style: { fillOpacity: 0, weight: 1, color: "rgba(255,255,255,0.12)" },
                    onEachFeature: (f, l) => {
                        l.on('click', (e) => { L.DomEvent.stopPropagation(e); jumpTo(f.properties.name); });
                    }
                }).addTo(map);
                loadData();
            }).catch(() => lb.innerText = "Status: GEO_FAIL");
    }

    function loadData() {
        fetch(`predictions.csv?v=${Date.now()}`).then(r => r.text()).then(txt => {
            const lines = txt.split('\n');
            const h = lines[0].split(',').map(x => x.trim());
            predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const o = {}; h.forEach((key, i) => o[key] = v[i]?.replace(/"/g, '').trim() || "");
                return o;
            });
            drawBadges();
            initTicker();
            lb.innerText = "Status: Operational (v2.7.4)";
        });
    }

    function initTicker() {
        const content = document.getElementById('ticker-content');
        const recent = predictions.slice(-10).reverse();
        content.innerHTML = recent.map(p => `<span class="ticker-item"><b>[${p["Date of Premonition"]}]</b> ${p["Country/Region"]}: ${p["Prediction Description"]}</span>`).join('') + " &nbsp; ";
        requestAnimationFrame(animateTicker);
    }

    function animateTicker() {
        const content = document.getElementById('ticker-content');
        if (!isPaused) {
            tickerPos -= 1;
            if (Math.abs(tickerPos) >= content.scrollWidth / 2) tickerPos = 0;
            content.style.transform = `translate3d(${tickerPos}px, 0, 0)`;
        }
        requestAnimationFrame(animateTicker);
    }

    function drawBadges() {
        geoLayer.eachLayer(layer => {
            const n = layer.feature.properties.name;
            const count = predictions.filter(p => (p["Country/Region"] || "").toLowerCase() === n.toLowerCase()).length;
            if (count > 0) {
                L.marker(layer.getBounds().getCenter(), { 
                    icon: L.divIcon({ className: '', html: `<div class="intel-badge pulse-red">${count}</div>`, iconSize: [22, 22] }) 
                }).addTo(map);
            }
        });
    }

    function jumpTo(name) {
        lb.innerText = "Status: Zooming to " + name;
        // Basic flyTo logic for brevity in this debug build
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Atlas | v2.3.5</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* VERSION 2.3.5 STYLES */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        #map { position: absolute; top: 32px; bottom: 0; left: 0; right: 0; z-index: 10; }
        .map-dimmed { opacity: 0.2; filter: grayscale(1) blur(2px); pointer-events: none; }

        /* THE LEFT PANEL - v2.3.5 FORCE POSITION */
        #intel-panel { 
            position: fixed !important; 
            top: 50px !important; 
            left: 10px !important; 
            width: 380px !important; 
            height: 80vh !important;
            background: #0f172a !important; 
            color: #fff !important; 
            display: none; 
            flex-direction: column; 
            z-index: 2000000 !important; 
            border: 3px solid #facc15 !important; /* Bright Yellow Border for Testing */
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        
        /* HEAT BADGE - v2.3.5 */
        .heat-badge { 
            background: #facc15 !important; 
            border: 2px solid #000 !important; 
            border-radius: 50% !important; 
            color: #000 !important; 
            font-weight: 900 !important; 
            font-size: 12px !important; 
            text-align: center !important;
            line-height: 24px !important;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.5) !important;
        }

        #ticker-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 32px; background: #0f172a; z-index: 100000; border-bottom: 1px solid #334155; }
        #ver-tag { position: fixed; bottom: 10px; right: 10px; z-index: 3000000; background: #ef4444; color: white; padding: 3px 8px; font-size: 10px; font-weight: bold; border-radius: 3px; }
        
        #hover-card { position: fixed; top: 50px; right: 10px; width: 280px; background: white; border-radius: 8px; padding: 15px; display: none; z-index: 1000000; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="ver-tag">BUILD v2.3.5</div>
<div id="ticker-wrap"><div id="ticker-content" style="color:#94a3b8; font-size:11px; line-height:32px; padding-left:20px;">SYSTEM READY...</div></div>

<div id="intel-panel">
    <div style="padding:15px; background:#1e293b; display:flex; justify-content:space-between; align-items:center;">
        <b id="intel-title" style="color:#facc15; letter-spacing:1px;">INTEL FEED</b>
        <button onclick="closeIntel()" style="background:#ef4444; color:white; border:none; padding:5px 15px; cursor:pointer; font-weight:bold; border-radius:4px;">CLOSE ✕</button>
    </div>
    <div id="intel-body" style="overflow-y:auto; flex-grow:1; padding:15px; background:#0f172a;"></div>
</div>

<div id="hover-card">
    <div id="card-header" style="font-weight:bold; font-size:18px; color:#2563eb; margin-bottom:10px;"></div>
    <div style="font-size:11px; line-height:1.8;">
        <div><b>GDP:</b> <span id="card-gdp">...</span></div>
        <div><b>Inflation:</b> <span id="card-inf">...</span></div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, geoLayer, isLocked = false, predictions = [], worldData = {};

    function initMap() {
        map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.7 }).addTo(map);
        
        loadData();
    }

    async function loadData() {
        const ts = Date.now();
        try {
            // 1. Geography
            const gRes = await fetch(`https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson`);
            const gData = await gRes.json();
            geoLayer = L.geoJSON(gData, {
                style: { fillOpacity: 0, weight: 1.5, color: "rgba(255,255,255,0.2)" },
                onEachFeature: (f, layer) => {
                    layer.on({
                        mouseover: (e) => { if(!isLocked) { highlightFeature(e); updateHover(f.properties.name, f.properties.iso_a3); showIntel(f.properties.name); }},
                        mouseout: (e) => { if(!isLocked) { resetHighlight(e); hideUI(); }},
                        click: (e) => { L.DomEvent.stopPropagation(e); doLock(f.properties.name, f.properties.iso_a3); }
                    });
                }
            }).addTo(map);

            // 2. Predictions
            const pRes = await fetch(`predictions.csv?v=${ts}`);
            const pTxt = await pRes.text();
            predictions = pTxt.split('\n').slice(1).filter(l => l.trim() !== "").map(line => {
                const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { country: v[1]?.replace(/"/g, '').trim(), text: v[2]?.replace(/"/g, '').trim(), date: v[0] };
            });

            // 3. Icons
            drawBadges();
            
            document.getElementById('ticker-content').innerText = "V2.3.5 ACTIVE - DATA LOADED";
        } catch(e) { console.error(e); }
    }

    function drawBadges() {
        geoLayer.eachLayer(layer => {
            const name = layer.feature.properties.name;
            const count = predictions.filter(p => p.country?.toLowerCase() === name.toLowerCase()).length;
            if (count > 0) {
                const center = layer.getBounds().getCenter();
                L.marker(center, { 
                    icon: L.divIcon({ 
                        className: 'heat-badge', 
                        html: count, 
                        iconSize: [24, 24] 
                    }) 
                }).addTo(map).on('click', (e) => { 
                    L.DomEvent.stopPropagation(e); 
                    doLock(name, layer.feature.properties.iso_a3); 
                });
            }
        });
    }

    function showIntel(name) {
        const matching = predictions.filter(p => p.country?.toLowerCase() === name.toLowerCase());
        const panel = document.getElementById('intel-panel');
        if (matching.length > 0) {
            panel.style.display = 'flex';
            document.getElementById('intel-title').innerText = name.toUpperCase();
            document.getElementById('intel-body').innerHTML = matching.map(p => `
                <div style="padding-bottom:15px; margin-bottom:15px; border-bottom:1px solid #334155;">
                    <div style="font-size:10px; color:#facc15; font-weight:bold;">${p.date}</div>
                    <div style="margin-top:5px; font-size:14px; line-height:1.4;">${p.text}</div>
                </div>
            `).join('');
        } else {
            panel.style.display = 'none';
        }
    }

    function highlightFeature(e) { e.target.setStyle({ weight: 3, color: '#facc15', fillOpacity: 0.1 }); }
    function resetHighlight(e) { geoLayer.resetStyle(e.target); }

    function updateHover(name, code) {
        document.getElementById('hover-card').style.display = 'block';
        document.getElementById('card-header').innerText = name;
        // Basic World Bank GDP fetch
        fetch(`https://api.worldbank.org/v2/country/${code}/indicator/NY.GDP.MKTP.CD?format=json&date=2022`)
            .then(r => r.json()).then(d => {
                if(d[1]) document.getElementById('card-gdp').innerText = "$" + (d[1][0].value/1e12).toFixed(2) + " Trillion";
            });
    }

    function doLock(name, iso) {
        isLocked = true;
        document.getElementById('map').classList.add('map-dimmed');
        showIntel(name);
        updateHover(name, iso);
    }

    function closeIntel() {
        isLocked = false;
        document.getElementById('map').classList.remove('map-dimmed');
        document.getElementById('intel-panel').style.display = 'none';
        document.getElementById('hover-card').style.display = 'none';
    }

    function hideUI() {
        document.getElementById('intel-panel').style.display = 'none';
        document.getElementById('hover-card').style.display = 'none';
    }

    initMap();
</script>
</body>
</html>

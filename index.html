<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Project | v1.1.5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #05070a; overflow: hidden; font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100vw; }

        /* Search Bar Styling */
        #search-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 300px;
        }
        #search-input {
            width: 100%; padding: 12px 20px; border-radius: 25px;
            border: 1px solid rgba(79, 209, 197, 0.3); background: rgba(15, 20, 28, 0.9);
            color: white; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        #search-input::placeholder { color: #8a94a6; }

        /* Popup Styling */
        .leaflet-popup-content-wrapper { background: rgba(15, 20, 28, 0.98) !important; color: #fff !important; border-radius: 6px !important; border: 1px solid rgba(79, 209, 197, 0.3); }
        .leaflet-popup-content { margin: 10px !important; width: 190px !important; }
        .pop-container { display: flex; flex-direction: column; gap: 6px; }
        .pop-top { display: flex; align-items: center; gap: 10px; }
        .pop-flag { width: 38px; height: 24px; border-radius: 2px; object-fit: cover; }
        .pop-country { font-size: 13px; font-weight: 700; margin: 0; color: #fff; line-height: 1.1; }
        .pop-leader { font-size: 11px; color: #4fd1c5; font-weight: 500; }
        .pop-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; font-size: 9px; display: flex; justify-content: space-between; color: #8a94a6; }

        #version-tag { position: absolute; bottom: 10px; right: 10px; background: #000; color: #4fd1c5; padding: 4px 10px; font-family: monospace; font-size: 10px; z-index: 1000; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Search for a country...">
</div>

<div id="map"></div>
<div id="version-tag">v1.1.5 - Phase 4 Resume</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Project | Phase 2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; }
        #map { height: 100vh; width: 100vw; background: #0b0e14; }
        
        /* Custom styling for the map borders */
        .country-style {
            transition: all 0.2s;
        }
    </style>
</head>
<body>

<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize map
    const map = L.map('map', {
        zoomSnap: 0.1,         // Allows for much smoother, fractional zooming
        attributionControl: false // Cleans up the bottom right corner
    }).setView([20, 0], 2);

    const geojsonStyle = {
        fillColor: "#1a1f26",
        weight: 1,
        opacity: 1,
        color: '#4a5568',
        fillOpacity: 0.7
    };

    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
        .then(response => response.json())
        .then(data => {
            const worldLayer = L.geoJSON(data, {
                style: geojsonStyle,
                onEachFeature: function (feature, layer) {
                    layer.on({
                        mouseover: (e) => {
                            e.target.setStyle({ fillOpacity: 1, fillColor: "#3182ce" });
                        },
                        mouseout: (e) => {
                            e.target.setStyle(geojsonStyle);
                        }
                    });
                }
            }).addTo(map);

            // MAGIC LINE: This forces the map to zoom in until the land hits the edges
            map.fitBounds(worldLayer.getBounds(), { padding: [10, 10] });
        });
</script>
</body>
</html>

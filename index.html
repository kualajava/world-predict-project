<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.2.5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #aad3df; }

        /* The "Numbers" on the map */
        .intel-badge {
            background: #f6e05e; border: 2px solid #000; border-radius: 50%;
            color: #000; font-weight: 900; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.3); pointer-events: auto;
        }

        /* Intelligence Panel */
        #intel-panel {
            position: fixed; top: 80px; left: 20px; z-index: 9999;
            width: 340px; max-height: 70vh;
            background: rgba(15, 23, 42, 0.98); border-radius: 12px; border: 1px solid #334155;
            color: white; display: none; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .intel-header { padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .pred-box { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .pred-meta { font-size: 10px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .pred-text { font-size: 13px; line-height: 1.5; color: #e2e8f0; }

        /* Floating Cards */
        #hover-card { position: fixed; top: 20px; right: 20px; z-index: 9999; background: white; padding: 12px; border-radius: 8px; display: none; width: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); pointer-events: none; }
        
        /* Debug Logger (Shows progress in bottom left) */
        #log { position: fixed; bottom: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.8); color: #00ff00; padding: 5px 10px; font-size: 10px; border-radius: 4px; font-family: monospace; pointer-events: none; max-width: 300px; }
    </style>
</head>
<body>

<div id="log">Status: Starting...</div>
<div id="hover-card">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="" id="card-flag" style="width:30px; border:1px solid #ddd;">
        <b id="card-name" style="font-size:14px;"></b>
    </div>
</div>

<div id="intel-panel">
    <div class="intel-header">
        <span id="intel-title" style="color:#f6e05e; font-weight:bold; font-size:12px; text-transform:uppercase;">Intel</span>
        <button onclick="closeIntel()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <div id="intel-body"></div>
</div>

<div id="map"></div>

<script>
    const logger = document.getElementById('log');
    function log(msg) { logger.innerText = "Status: " + msg; console.log(msg); }

    let predictions = [], worldData = {}, isLocked = false;
    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);

    // Load Tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    log("Tiles Loaded");

    const ts = new Date().getTime();

    // 1. DATA LOADING ENGINE
    async function start() {
        try {
            // Load API Data (Region/Flags)
            const apiRes = await fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,region`).then(r => r.json());
            apiRes.forEach(c => worldData[c.cca3] = c);
            log("Country Data Ready");

            // Attempt to load CSV (Checking multiple possible names)
            let csvText = "";
            const filesToTry = ['predictions.csv', 'Global_Predictions - Processed_PolishPredictions.csv'];
            
            for (let f of filesToTry) {
                try {
                    const res = await fetch(`${f}?v=${ts}`);
                    if (res.ok) {
                        csvText = await res.text();
                        log("File Found: " + f);
                        break;
                    }
                } catch(e) {}
            }

            if (csvText) {
                const lines = csvText.split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((h, i) => obj[h] = values[i]?.replace(/"/g, '').trim() || "");
                    return obj;
                });
                log(`Parsed ${predictions.length} predictions`);
            } else {
                log("No CSV found. Showing map only.");
            }

            loadGeo();
        } catch (err) {
            log("CRITICAL ERROR: " + err.message);
        }
    }

    function loadGeo() {
        log("Fetching GeoJSON...");
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(r => r.json())
            .then(geo => {
                L.geoJSON(geo, {
                    style: (f) => {
                        const colors = { 'Africa': '#f6ad55', 'Americas': '#68d391', 'Asia': '#fc8181', 'Europe': '#63b3ed', 'Oceania': '#f6e05e' };
                        const reg = worldData[f.properties.iso_a3]?.region;
                        return { fillColor: colors[reg] || '#cbd5e0', weight: 1, color: "white", fillOpacity: 0.6 };
                    },
                    onEachFeature: (f, layer) => {
                        const name = f.properties.name;
                        const code = f.properties.iso_a3;

                        // Match logic
                        const matches = predictions.filter(p => {
                            const cField = (p["Country/Region"] || "").toLowerCase();
                            const mName = name.toLowerCase();
                            if ((mName.includes("united states") || mName === "usa") && (cField.includes("usa") || cField.includes("united states"))) return true;
                            return cField.includes(mName) || mName.includes(cField);
                        });

                        // Add Marker
                        if (matches.length > 0) {
                            try {
                                const center = layer.getBounds().getCenter();
                                L.marker(center, {
                                    icon: L.divIcon({
                                        className: '',
                                        html: `<div class="intel-badge">${matches.length}</div>`,
                                        iconSize: [22, 22]
                                    })
                                }).addTo(map).on('click', (e) => {
                                    L.DomEvent.stopPropagation(e);
                                    showIntel(name, matches, code);
                                });
                            } catch(e) {}
                        }

                        layer.on({
                            mouseover: () => { if(!isLocked) showHover(name, code); },
                            mouseout: () => { if(!isLocked) hideHover(); },
                            click: (e) => { L.DomEvent.stopPropagation(e); showIntel(name, matches, code); }
                        });
                    }
                }).addTo(map);
                log("Atlas Operational");
            })
            .catch(e => log("GeoJSON Error: " + e.message));
    }

    function showHover(name, code) {
        const card = document.getElementById('hover-card');
        const d = worldData[code];
        if (d) {
            document.getElementById('card-flag').src = d.flags.png;
            document.getElementById('card-name').innerText = d.name.common;
            card.style.display = 'block';
        }
    }

    function hideHover() { document.getElementById('hover-card').style.display = 'none'; }

    function showIntel(name, data, code) {
        isLocked = true;
        const panel = document.getElementById('intel-panel');
        document.getElementById('intel-title').innerText = `${name} (${data.length})`;
        
        let content = data.map(p => `
            <div class="pred-box">
                <div class="pred-meta"><span>${p["Date of Premonition"]}</span><span style="color:#68d391">${p["Meta Data"]}</span></div>
                <div class="pred-text">${p["Prediction Description"]}</div>
            </div>
        `).join('');

        if (data.length === 0) content = "<div style='padding:20px; color:gray;'>No localized data for this region.</div>";
        
        document.getElementById('intel-body').innerHTML = content;
        panel.style.display = 'block';
        showHover(name, code);
    }

    function closeIntel() {
        isLocked = false;
        document.getElementById('intel-panel').style.display = 'none';
        hideHover();
    }

    // Global Click for "Global" category
    map.on('click', () => {
        const g = predictions.filter(p => (p["Country/Region"] || "").toLowerCase().includes("global"));
        showIntel("Global Intel", g, "");
    });

    start();
</script>
</body>
</html>

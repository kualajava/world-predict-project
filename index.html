<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Project | v1.1.3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Essential CSS to prevent blank screen */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #05070a; }
        #map { height: 100vh; width: 100vw; }

        /* Compact Dashboard Popup */
        .leaflet-popup-content-wrapper {
            background: rgba(15, 20, 28, 0.98) !important;
            color: #fff !important;
            border-radius: 6px !important;
            border: 1px solid rgba(79, 209, 197, 0.3);
        }
        .leaflet-popup-content { margin: 10px !important; width: 200px !important; }
        .pop-container { font-family: sans-serif; display: flex; flex-direction: column; gap: 8px; }
        .pop-top { display: flex; align-items: center; gap: 10px; }
        .pop-flag { width: 40px; height: 26px; border-radius: 2px; object-fit: cover; }
        .pop-info { display: flex; flex-direction: column; }
        .pop-country { font-size: 14px; font-weight: 700; margin: 0; color: #fff; line-height: 1.1; }
        .pop-leader { font-size: 11px; color: #4fd1c5; font-weight: 500; margin-top: 2px; }
        .pop-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; font-size: 10px; display: flex; justify-content: space-between; }

        #version-tag { position: absolute; bottom: 10px; right: 10px; background: #000; color: #4fd1c5; padding: 4px 10px; font-family: monospace; font-size: 10px; z-index: 1000; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="version-tag">v1.1.3 - Fixed Map Rendering</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Initialize Map IMMEDIATELY
    const map = L.map('map', { 
        zoomSnap: 0.1, 
        attributionControl: false 
    }).setView([25, 0], 2.3);

    let worldData = {};
    let leaderData = {};

    // 2. Fetch Border Data first (The most important part for visibility)
    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
        .then(res => res.json())
        .then(geoData => {
            L.geoJSON(geoData, {
                style: { fillColor: "#1a1f26", weight: 1, color: '#4a5568', fillOpacity: 0.7 },
                onEachFeature: (feature, layer) => {
                    layer.on('click', () => showPopup(feature, layer));
                    layer.on('mouseover', (e) => e.target.setStyle({ fillOpacity: 1, fillColor: "#3182ce" }));
                    layer.on('mouseout', (e) => e.target.setStyle({ fillOpacity: 0.7, fillColor: "#1a1f26" }));
                }
            }).addTo(map);
        });

    // 3. Fetch Data in background (Non-blocking)
    fetch('leaders.csv').then(res => res.text()).then(text => {
        text.split(/\r?\n/).slice(1).forEach(row => {
            const cols = row.split(',');
            if (cols[0]) leaderData[cols[0].trim().toUpperCase()] = { name: cols[1], title: cols[2] };
        });
    }).catch(e => console.log("CSV load skipped"));

    fetch('https://restcountries.com/v3.1/all?fields=name,cca3,flags,population')
        .then(res => res.json())
        .then(data => {
            data.forEach(c => worldData[c.cca3] = c);
        });

    function showPopup(feature, layer) {
        const code = (feature.properties.iso_a3 || "").toUpperCase();
        const live = worldData[code];
        const leader = leaderData[code];

        if (live) {
            const pop = live.population.toLocaleString();
            const lName = leader ? leader.name : "Data Pending";
            layer.bindPopup(`
                <div class="pop-container">
                    <div class="pop-top">
                        <img src="${live.flags.png}" class="pop-flag">
                        <div class="pop-info">
                            <h2 class="pop-country">${live.name.common}</h2>
                            <span class="pop-leader">${lName}</span>
                        </div>
                    </div>
                    <div class="pop-bottom">
                        <span>POPULATION</span>
                        <span style="color:#cbd5e0">${pop}</span>
                    </div>
                </div>
            `, { maxWidth: 220, closeButton: false }).openPopup();
        } else {
            layer.bindPopup("<h3>" + feature.properties.name + "</h3><p>Loading stats...</p>").openPopup();
        }
    }
</script>
</body>
</html>

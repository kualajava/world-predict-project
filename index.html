<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Project | v1.2.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 1. Ensure the map container is never 0px */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #f0f4f8; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; background: #aad3df; }

        /* 2. Floating Search Bar */
        #search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 2000; width: 320px;
        }
        #search-input {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            border: 2px solid #3182ce; background: white;
            color: #2d3748; font-size: 14px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 3. Popup Styling */
        .leaflet-popup-content-wrapper { border-radius: 8px !important; padding: 0 !important; box-shadow: 0 5px 15px rgba(0,0,0,0.2) !important; }
        .leaflet-popup-content { margin: 12px !important; width: 200px !important; }
        .pop-container { display: flex; flex-direction: column; gap: 5px; }
        .pop-top { display: flex; align-items: center; gap: 10px; }
        .pop-flag { width: 40px; border: 1px solid #eee; }
        .pop-country { font-size: 14px; font-weight: bold; margin: 0; color: #1a202c; }
        .pop-leader { font-size: 12px; color: #3182ce; font-weight: 600; }
        .pop-bottom { border-top: 1px solid #eee; padding-top: 5px; font-size: 10px; color: #718096; display: flex; justify-content: space-between; }

        #version-tag { position: absolute; bottom: 10px; right: 10px; background: white; color: #3182ce; padding: 4px 10px; font-family: monospace; font-size: 10px; z-index: 2000; border: 1px solid #cbd5e0; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Search Country, Leader, or Ocean...">
</div>

<div id="map"></div>
<div id="version-tag">v1.2.2 - Reliability First</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Map IMMEDIATELY
    const map = L.map('map', { 
        zoomSnap: 0.1, 
        attributionControl: false 
    }).setView([20, 0], 2.5);

    // 1. BASE LAYER: Physical Map (Rivers, Terrain, Water depth)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);

    let worldData = {};
    let leaderData = {};
    let geoJsonLayer;
    const ts = new Date().getTime();

    // 2. LAYER 2: TOP LABELS (Ocean names & Sea names stay on top)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        zIndex: 1000
    }).addTo(map);

    // 3. BACKGROUND DATA LOADING (Non-blocking)
    fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(txt => {
        txt.split('\n').slice(1).forEach(row => {
            const [code, leader, title] = row.split(',');
            if (code) leaderData[code.trim().toUpperCase()] = { name: leader, title: title };
        });
    }).catch(e => console.log("CSV skipped"));

    fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,population`).then(r => r.json()).then(data => {
        data.forEach(c => worldData[c.cca3] = c);
    });

    // 4. INTERACTIVE BORDERS
    fetch(`https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson`)
        .then(res => res.json())
        .then(geoData => {
            geoJsonLayer = L.geoJSON(geoData, {
                style: { 
                    fillColor: "#9dbb8a", // Classic Map Green
                    weight: 1, 
                    color: "rgba(0,0,0,0.2)", 
                    fillOpacity: 0.3 // Light enough to see Rivers underneath
                },
                onEachFeature: (feature, layer) => {
                    layer.on('click', () => {
                        const code = (feature.properties.iso_a3 || "").toUpperCase();
                        const live = worldData[code];
                        const leader = leaderData[code];
                        
                        const pop = live ? live.population.toLocaleString() : "Loading...";
                        const flag = live ? live

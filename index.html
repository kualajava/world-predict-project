<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.3.4</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #aad3df; }
        #log { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #000; color: #00ff00; padding: 8px 15px; font-size: 12px; border-radius: 5px; font-family: monospace; border: 1px solid #334155; }
        .intel-badge { background: #f6e05e; border: 2px solid #000; border-radius: 50%; color: #000; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,0,0,0.4); }
        #hover-card { position: fixed; top: 20px; right: 20px; z-index: 9999; background: white; padding: 15px; border-radius: 10px; display: none; width: 240px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: none; border: 1px solid #ddd; }
        #intel-panel { position: fixed; top: 80px; left: 20px; z-index: 9999; width: 340px; max-height: 75vh; background: rgba(15, 23, 42, 0.98); border-radius: 12px; border: 1px solid #334155; color: white; display: none; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .intel-header { padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .pred-box { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .pred-meta { font-size: 10px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .pred-cat { color: #68d391; font-weight: bold; background: rgba(104,211,145,0.1); padding: 2px 6px; border-radius: 4px; }
        .pred-text { font-size: 13px; line-height: 1.6; color: #f1f5f9; }
    </style>
</head>
<body>

<div id="log">Status: Awaiting Script...</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <img src="" id="card-flag" style="width:40px; border:1px solid #eee; display:none;">
        <b id="card-name" style="font-size:16px; color:#1a202c;"></b>
    </div>
    <div style="font-size:12px; margin-bottom:4px;"><span style="color:#64748b; font-weight:600;">Leader:</span> <span id="card-leader" style="color:#3182ce; font-weight:700;"></span></div>
    <div style="font-size:12px;"><span style="color:#64748b; font-weight:600;">Population:</span> <span id="card-pop" style="color:#1a202c; font-weight:600;"></span></div>
</div>

<div id="intel-panel">
    <div class="intel-header">
        <span id="intel-title" style="color:#f6e05e; font-weight:800; font-size:12px; text-transform:uppercase;">Intel Feed</span>
        <button onclick="closeIntel()" style="background:rgba(255,255,255,0.1); border:none; color:white; cursor:pointer; width:26px; height:26px; border-radius:50%;">✕</button>
    </div>
    <div id="intel-body"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // IMMEDIATE EXECUTION CHECK
    const lb = document.getElementById('log');
    lb.innerHTML = "Status: Script Executed. Initializing...";

    let map, geoLayer, isLocked = false;
    let predictions = [], worldData = {}, leaderData = {};

    function start() {
        if (typeof L === 'undefined') {
            lb.innerHTML = "Status: ERROR - Leaflet library failed to load.";
            return;
        }

        try {
            map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            lb.innerHTML = "Status: Map Canvas Ready.";

            // Load shapes
            fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
                .then(r => r.json())
                .then(geo => {
                    geoLayer = L.geoJSON(geo, {
                        style: { fillColor: '#cbd5e0', weight: 1, color: "white", fillOpacity: 0.6 },
                        onEachFeature: (f, layer) => {
                            const name = f.properties.name;
                            const code = f.properties.iso_a3;
                            layer.on({
                                mouseover: () => { updateHover(name, code); if(!isLocked) showIntel(name, false); },
                                mouseout: () => { if(!isLocked) { document.getElementById('hover-card').style.display='none'; document.getElementById('intel-panel').style.display='none'; }},
                                click: (e) => { L.DomEvent.stopPropagation(e); isLocked = true; updateHover(name, code); showIntel(name, true); }
                            });
                        }
                    }).addTo(map);
                    lb.innerHTML = "Status: Land Shapes Drawn. Loading Intel...";
                    loadData();
                });
        } catch (e) {
            lb.innerHTML = "Status: Runtime Error: " + e.message;
        }
    }

    function loadData() {
        const ts = Date.now();
        // CSV 1
        fetch(`predictions.csv?v=${ts}`).then(r => r.text()).then(txt => {
            const lines = txt.split('\n');
            const h = lines[0].split(',').map(x => x.trim());
            predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const o = {};
                h.forEach((key, i) => o[key] = v[i]?.replace(/"/g, '').trim() || "");
                return o;
            });
            drawBadges();
            lb.innerHTML = "Status: Atlas Fully Operational.";
        }).catch(() => lb.innerHTML = "Status: CSV Error.");

        // Leaders
        fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(txt => {
            txt.split('\n').slice(1).forEach(row => {
                const p = row.split(',');
                if(p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
            });
        });

        // API
        fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,region,population`)
            .then(r => r.json()).then(data => data.forEach(c => worldData[c.cca3] = c));
    }

    function drawBadges() {
        geoLayer.eachLayer(layer => {
            const n = layer.feature.properties.name;
            const matches = predictions.filter(p => {
                const c = (p["Country/Region"] || "").toLowerCase();
                const m = n.toLowerCase();
                if ((m.includes("united states") || m === "usa") && (c.includes("usa") || c.includes("united states"))) return true;
                return c.includes(m) || m.includes(c);
            });
            if (matches.length > 0) {
                const center = layer.getBounds().getCenter();
                L.marker(center, { icon: L.divIcon({ className: '', html: `<div class="intel-badge">${matches.length}</div>`, iconSize: [22, 22] }) }).addTo(map);
            }
        });
    }

    function updateHover(name, code) {
        const d = worldData[code];
        document.getElementById('card-name').innerText = d ? d.name.common : name;
        document.getElementById('card-leader').innerText = leaderData[code]?.name || "N/A";
        document.getElementById('card-pop').innerText = d ? d.population.toLocaleString() : "N/A";
        const fl = document.getElementById('card-flag');
        if (d && d.flags) { fl.src = d.flags.png; fl.style.display = 'block'; } else { fl.style.display = 'none'; }
        document.getElementById('hover-card').style.display = 'block';
    }

    function showIntel(name, lock = false) {
        const matches = predictions.filter(p => {
            const c = (p["Country/Region"] || "").toLowerCase();
            const m = name.toLowerCase();
            if ((m.includes("united states") || m === "usa") && (c.includes("usa

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.4.3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #aad3df; }
        #log { position: fixed; bottom: 20px; left: 20px; z-index: 10000; background: #000; color: #4ade80; padding: 8px 15px; font-size: 11px; border-radius: 5px; font-family: monospace; border: 1px solid #334155; pointer-events: none; }
        
        /* SEARCH BAR LAYER */
        .leaflet-top.leaflet-left { z-index: 10001 !important; }
        
        /* UI PANELS */
        #hover-card { position: fixed; top: 80px; right: 20px; z-index: 9999; background: white; padding: 15px; border-radius: 10px; display: none; width: 240px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid #ddd; pointer-events: none; }
        #intel-panel { position: fixed; top: 80px; left: 20px; z-index: 9998; width: 340px; max-height: 75vh; background: rgba(15, 23, 42, 0.95); border-radius: 12px; border: 1px solid #334155; color: white; display: none; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px); transition: all 0.3s ease; }
        
        .intel-header { padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .pred-box { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); transition: background 0.2s; }
        .pred-box:hover { background: rgba(255,255,255,0.03); }
        .pred-text { font-size: 13.5px; line-height: 1.6; color: #f1f5f9; }
        
        /* BADGE DESIGN */
        .intel-badge { background: #f6e05e; border: 2px solid #000; border-radius: 50%; color: #000; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(246, 224, 94, 0.4); cursor: pointer; transition: transform 0.2s; }
        .intel-badge:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div id="log">Status: Initializing Cinematic Engine...</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <img src="" id="card-flag" style="width:40px; border:1px solid #eee; display:none;">
        <b id="card-name" style="font-size:16px; color:#1a202c;"></b>
    </div>
    <div style="font-size:12px; margin-bottom:4px;"><span style="color:#64748b; font-weight:600;">Leader:</span> <span id="card-leader" style="color:#3182ce; font-weight:700;"></span></div>
    <div style="font-size:12px;"><span style="color:#64748b; font-weight:600;">Population:</span> <span id="card-pop" style="color:#1a202c; font-weight:600;"></span></div>
</div>

<div id="intel-panel">
    <div class="intel-header">
        <span id="intel-title" style="color:#f6e05e; font-weight:800; font-size:11px; text-transform:uppercase; letter-spacing:1px;">Intel Feed</span>
        <button onclick="closeIntel()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px; opacity:0.6;">✕</button>
    </div>
    <div id="intel-body"></div>
</div>

<div id="map"></div>

<script>
    const lb = document.getElementById('log');
    let map, geoLayer, isLocked = false;
    let predictions = [], worldData = {}, leaderData = {};

    const customCenters = {
        "France": [46.2276, 2.2137],
        "United States of America": [37.0902, -95.7129],
        "United Kingdom": [55.3781, -3.4360]
    };

    function init() {
        // Build Map with smooth zooming enabled
        map = L.map('map', { 
            zoomSnap: 0.1, 
            attributionControl: false,
            zoomAnimation: true,
            fadeAnimation: true
        }).setView([20, 0], 2.2);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 8 }).addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.85 }).addTo(map);

        // CINEMATIC SEARCH: Uses flyTo instead of fitBounds for a better feel
        L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Search the Globe..." })
        .on('markgeocode', function(e) { 
            const center = e.geocode.center;
            map.flyTo(center, 5, { duration: 2, easeLinearity: 0.25 }); 
        })
        .addTo(map);

        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(r => r.json())
            .then(geo => {
                geoLayer = L.geoJSON(geo, {
                    style: { fillOpacity: 0, weight: 1, color: "rgba(255,255,255,0.1)" },
                    onEachFeature: (f, layer) => {
                        const name = f.properties.name;
                        layer.on({
                            mouseover: () => {
                                layer.setStyle({ fillOpacity: 0.15, fillColor: '#fff' });
                                updateHover(name, f.properties.iso_a3);
                                if(!isLocked) showIntel(name, false); 
                            },
                            mouseout: () => {
                                layer.setStyle({ fillOpacity: 0 });
                                if(!isLocked) {
                                    document.getElementById('hover-card').style.display='none';
                                    document.getElementById('intel-panel').style.display='none';
                                }
                            },
                            click: (e) => {
                                L.DomEvent.stopPropagation(e);
                                isLocked = true;
                                // CINEMATIC ZOOM ON CLICK
                                const target = customCenters[name] || layer.getBounds().getCenter();
                                map.flyTo(target, 4.5, { duration: 1.5 });
                                
                                updateHover(name, f.properties.iso_a3);
                                showIntel(name, true);
                            }
                        });
                    }
                }).addTo(map);
                loadData();
            });
    }

    function getMatches(mapName) {
        const m = mapName.toLowerCase();
        return predictions.filter(p => {
            const c = (p["Country/Region"] || "").toLowerCase();
            if ((m.includes("united states") || m === "usa") && (c.includes("united states") || c === "usa")) return true;
            if (m === "brazil" && c.includes("south america")) return true;
            if (m.includes("saudi arabia") && c.includes("middle east")) return true;
            return c.includes(m) || m.includes(c);
        });
    }

    function loadData() {
        const ts = Date.now();
        fetch(`predictions.csv?v=${ts}`).then(r => r.text()).then(txt => {
            const lines = txt.split('\n');
            const h = lines[0].split(',').map(x => x.trim());
            predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const o = {};
                h.forEach((key, i) => o[key] = v[i]?.replace(/"/g, '').trim() || "");
                return o;
            });
            drawBadges();
            lb.innerText = "Status: Systems Online.";
        });

        fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(txt => {
            txt.split('\n').

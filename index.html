<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Project | v1.1.9</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #d0e2f3; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #map { height: 100vh; width: 100vw; display: block; }

        /* Search Bar */
        #search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1100; width: 320px;
        }
        #search-input {
            width: 100%; padding: 12px 20px; border-radius: 25px;
            border: 1px solid #ccd6dd; background: rgba(255, 255, 255, 0.95);
            color: #2c3e50; font-size: 14px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Popup */
        .leaflet-popup-content-wrapper { background: #fff !important; color: #2c3e50 !important; border-radius: 8px !important; padding: 0 !important; }
        .leaflet-popup-content { margin: 12px !important; width: 210px !important; }
        .pop-container { display: flex; flex-direction: column; gap: 8px; }
        .pop-top { display: flex; align-items: center; gap: 12px; }
        .pop-flag { width: 45px; height: 30px; border-radius: 3px; object-fit: cover; border: 1px solid #eee; }
        .pop-country { font-size: 15px; font-weight: 700; margin: 0; }
        .pop-leader { font-size: 12px; color: #3182ce; font-weight: 600; }
        .pop-bottom { border-top: 1px solid #edf2f7; padding-top: 8px; font-size: 10px; display: flex; justify-content: space-between; color: #718096; }

        #version-tag { position: absolute; bottom: 10px; right: 10px; background: #fff; color: #718096; padding: 4px 10px; font-family: monospace; font-size: 10px; z-index: 1000; border: 1px solid #e2e8f0; border-radius: 4px; }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Atlas | v2.4.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #020617; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 64px; bottom: 0; left: 0; right: 0; z-index: 1; }
        .map-dimmed { opacity: 0.15; filter: grayscale(1) blur(4px); pointer-events: none; }
        #intel-panel { position: fixed !important; top: 80px !important; left: 20px !important; width: 400px !important; height: 80vh !important; background: #0f172a !important; color: #fff !important; display: none; flex-direction: column; z-index: 2000; border: 2px solid #facc15; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #hover-card { position: fixed; top: 80px; right: 20px; width: 320px; background: white; border-radius: 12px; padding: 15px; display: none; z-index: 1999; border: 1px solid #ddd; }
        .heat-badge { background: #facc15 !important; border: 2px solid #000 !important; border-radius: 50% !important; color: #000 !important; font-weight: 900 !important; font-size: 13px !important; display: flex !important; align-items: center !important; justify-content: center !important; box-shadow: 0 0 15px #facc15; }
        #ticker-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 32px; background: #0f172a; z-index: 2001; border-bottom: 1px solid #334155; }
        #debug-bar { position: fixed; top: 32px; left: 0; width: 100%; height: 32px; background: #22c55e; color: white; font-size: 11px; line-height: 32px; padding: 0 20px; z-index: 2001; font-weight: bold; }
        .stat-row { display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; padding: 8px 0; font-size: 12px; color: #334155; }
    </style>
</head>
<body>

<div id="ticker-wrap"><div id="ticker-content" style="color:#94a3b8; font-size:11px; line-height:32px; padding-left:20px;">v2.4.1 LIVE</div></div>
<div id="debug-bar">SCANNING CSV ROWS...</div>

<div id="intel-panel">
    <div style="padding:15px; background:#1e293b; display:flex; justify-content:space-between; align-items:center;">
        <b id="intel-title" style="color:#facc15;">INTEL FEED</b>
        <button onclick="closeIntel()" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">CLOSE ✕</button>
    </div>
    <div id="intel-body" style="overflow-y:auto; flex-grow:1; padding:20px;"></div>
</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <img src="" id="card-flag" style="width:40px; border:1px solid #eee;">
        <b id="card-name" style="font-size:20px; color:#1e40af;"></b>
    </div>
    <div class="stat-row"><span>Capital</span><b id="card-cap"></b></div>
    <div class="stat-row"><span>Leader</span><b id="card-leader">--</b></div>
    <div class="stat-row"><span>GDP</span><b id="card-gdp">--</b></div>
    <div class="stat-row"><span>Inflation</span><b id="card-inf">--</b></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, geoLayer, isLocked = false, predictions = [], worldData = {};

    function clean(str) { return str ? str.toLowerCase().replace(/[^a-z0-9]/g, '') : ''; }

    function initMap() {
        map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.7 }).addTo(map);
        loadData();
    }

    async function loadData() {
        const ts = Date.now();
        try {
            const pRes = await fetch(`predictions.csv?v=${ts}`);
            const pTxt = await pRes.text();
            
            // v2.4.1: Parse the WHOLE line to find the country anywhere
            predictions = pTxt.split('\n').slice(1).filter(l => l.trim() !== "").map(line => {
                return { rawLine: line, cleanLine: clean(line) };
            });
            document.getElementById('debug-bar').innerText = `READY: ${predictions.length} Rows Scanned`;

            const gRes = await fetch(`https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson`);
            const gData = await gRes.json();
            geoLayer = L.geoJSON(gData, {
                style: { fillOpacity: 0, weight: 1.5, color: "rgba(255,255,255,0.2)" },
                onEachFeature: (f, layer) => {
                    layer.on({
                        mouseover: (e) => { if(!isLocked) { e.target.setStyle({weight:3, color:'#facc15'}); updateUI(f.properties.name, f.properties.iso_a3); }},
                        mouseout: (e) => { if(!isLocked) { geoLayer.resetStyle(e.target); hideUI(); }},
                        click: (e) => { L.DomEvent.stopPropagation(e); doLock(f.properties.name, f.properties.iso_a3); }
                    });
                }
            }).addTo(map);

            fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,capital`).then(r => r.json()).then(data => {
                data.forEach(c => worldData[c.cca3] = c);
                drawIcons(); 
            });
        } catch (e) { document.getElementById('debug-bar').style.background = '#ef4444'; }
    }

    function drawIcons() {
        geoLayer.eachLayer(layer => {
            const countryKey = clean(layer.feature.properties.name);
            const matches = predictions.filter(p => p.cleanLine.includes(countryKey));
            if (matches.length > 0) {
                L.marker(layer.getBounds().getCenter(), { 
                    icon: L.divIcon({ className: 'heat-badge', html: matches.length, iconSize: [26, 26] }) 
                }).addTo(map).on('click', (e) => { 
                    L.DomEvent.stopPropagation(e); 
                    doLock(layer.feature.properties.name, layer.feature.properties.iso_a3); 
                });
            }
        });
    }

    function updateUI(name, iso) {
        const d = worldData[iso];
        const countryKey = clean(name);
        const matches = predictions.filter(p => p.cleanLine.includes(countryKey));
        
        document.getElementById('card-name').innerText = name;
        document.getElementById('card-cap').innerText = d?.capital ? d.capital[0] : "--";
        document.getElementById('card-flag').src = d?.flags?.png || "";
        document.getElementById('hover-card').style.display = 'block';

        const panel = document.getElementById('intel-panel');
        if (matches.length > 0) {
            panel.style.display = 'flex';
            document.getElementById('intel-title').innerText = name;
            document.getElementById('intel-body').innerHTML = matches.map(p => `
                <div style="margin-bottom:15px; border-bottom:1px solid #334155; padding-bottom:10px; font-size:14px; line-height:1.6;">
                    ${p.rawLine.split(',').slice(2).join(',').replace(/"/g, '')}
                </div>
            `).join('');
        } else { panel.style.display = 'none'; }
    }

    function doLock(n, i) { isLocked = true; document.getElementById('map').classList.add('map-dimmed'); updateUI(n, i); }
    function closeIntel() { isLocked = false; document.getElementById('map').classList.remove('map-dimmed'); hideUI(); }
    function hideUI() { document.getElementById('intel-panel').style.display = 'none'; document.getElementById('hover-card').style.display = 'none'; }
    initMap();
</script>
</body>
</html>

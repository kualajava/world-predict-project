<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.1.7</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #aad3df; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; top:0; left:0; z-index: 1; background: #aad3df; }

        /* Left Panel - Scrollable & Persistent */
        #intel-panel {
            position: fixed; top: 85px; left: 20px; z-index: 9999;
            width: 350px; max-height: calc(100vh - 150px);
            background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 0; display: none; overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); pointer-events: auto;
        }
        
        .intel-header { 
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); 
            background: rgba(30, 41, 59, 0.95); position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        .intel-title { font-size: 13px; font-weight: 800; color: #f6e05e; text-transform: uppercase; letter-spacing: 1.5px; }
        #close-intel { background: rgba(255,255,255,0.1); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        #close-intel:hover { background: #fc8181; }

        .prediction-entry { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); transition: background 0.3s; }
        .prediction-entry:hover { background: rgba(255,255,255,0.02); }
        .pred-meta { font-size: 10px; color: #94a3b8; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .pred-cat { color: #68d391; font-weight: bold; background: rgba(104, 211, 145, 0.1); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(104, 211, 145, 0.2); }
        .pred-desc { font-size: 13px; line-height: 1.7; color: #f1f5f9; }
        .pred-author { font-size: 11px; color: #3182ce; margin-top: 10px; font-style: italic; opacity: 0.8; }

        /* UI Controls */
        #status-bar { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: rgba(0,0,0,0.85); color: #00ff00; padding: 8px 14px; font-family: monospace; font-size: 11px; border-radius: 6px; display: flex; gap: 15px; border: 1px solid #444; }
        #search-container { position: fixed; top: 20px; left: 80px; z-index: 9999; width: 320px; }
        #search-input { width: 100%; padding: 12px 22px; border-radius: 25px; border: none; background: white; box-shadow: 0 4px 25px rgba(0,0,0,0.2); outline: none; font-size: 15px; }
        #hover-card { position: fixed; top: 20px; right: 20px; z-index: 9999; width: 260px; background: white; border-radius: 14px; padding: 20px; display: none; pointer-events: none; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #intel-panel::-webkit-scrollbar { width: 6px; }
        #intel-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div id="status-bar"><span id="status-text">Atlas: Ready</span><span style="color:#f6e05e; font-weight:bold; border-left:1px solid #444; padding-left:15px;">v2.1.7</span></div>

<div id="search-container"><input type="text" id="search-input" placeholder="Search Place or Leader..."></div>

<div id="intel-panel">
    <div class="intel-header">
        <div class="intel-title" id="intel-country-name">Intelligence Feed</div>
        <button id="close-intel" title="Close">✕</button>
    </div>
    <div id="intel-content"></div>
</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <img src="" id="flag" style="width:44px; height:30px; object-fit:cover; border-radius:4px; border:1px solid #eee;">
        <h2 id="name" style="font-size:18px; font-weight:700;

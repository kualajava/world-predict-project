<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v1.3.6</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #aad3df; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; top:0; left:0; z-index: 1; background: #aad3df; }

        #status-bar { 
            position: fixed; bottom: 20px; left: 20px; z-index: 9999; 
            background: rgba(0, 0, 0, 0.85); color: #00ff00; 
            padding: 8px 14px; font-family: monospace; font-size: 11px; 
            border-radius: 6px; display: flex; gap: 15px; border: 1px solid #333;
        }
        .v-tag { color: #3182ce; font-weight: bold; border-left: 1px solid #444; padding-left: 15px; }

        #search-container { position: fixed; top: 20px; left: 80px; z-index: 9999; width: 320px; }
        #search-input { 
            width: 100%; padding: 12px 20px; border-radius: 25px; border: none;
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15); outline: none; font-size: 15px;
        }

        #hover-card {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            width: 240px; background: rgba(255, 255, 255, 0.98); 
            border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            padding: 16px; display: none; pointer-events: none; border: 1px solid #eee;
        }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .card-flag { width: 40px; border: 1px solid #ddd; border-radius: 3px; }
        .card-country { font-size: 16px; font-weight: 700; margin: 0; }
        .card-label { font-size: 10px; color: #718096; text-transform: uppercase; margin-top: 8px; }
        .card-val { font-size: 14px; font-weight: 600; color: #2d3748; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="status-text">System: Ready</span>
    <span class="v-tag">v1.3.6</span>
</div>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Search Place, Leader, or Landmark...">
</div>

<div id="hover-card">
    <div class="card-header">
        <img src="" id="flag" class="card-flag">
        <h2 class="card-country" id="name"></h2>
    </div>
    <div class="card-label">Leader</div>
    <div class="card-val" id="leader" style="color:#3182ce"></div>
    <div class="card-label">Population</div>
    <div class="card-val" id="pop"></div>
</div>

<div id="map"></div>

<script>
    const statusText = document.getElementById('status-text');
    const card = document.getElementById('hover-card');
    let map, geoJsonLayer, worldData = {}, leaderData = {};
    let searchTimeout;

    function boot() {
        try {
            map = L.map('map', { 
                zoomSnap: 0.1, 
                attributionControl: false,
                worldCopyJump: true,
                fadeAnimation: false 
            }).setView([20, 0], 2.2);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                crossOrigin: true
            }).addTo(map);

            loadContent();
        } catch (e) {
            statusText.innerText = "System: Engine Fail";
        }
    }

    async function loadContent() {
        const ts = new Date().getTime();
        try {
            const [csvRes, apiRes] = await Promise.all([
                fetch(`leaders.csv?v=${ts}`).then(r => r.text()),
                fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,population,region`).then(r => r.json())
            ]);

            csvRes.split('\n').slice(1).forEach(row => {
                const p = row.split(',');
                if (p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
            });
            apiRes.forEach(c => worldData[c.cca3] = c);

            const geo = await fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson').then(r => r.json());

            geoJsonLayer = L.geoJSON(geo, {
                style: (f) => {
                    const colors = { 'Africa': '#f6ad55', 'Americas': '#68d391', 'Asia': '#fc8181', 'Europe': '#63b3ed', 'Oceania': '#f6e05e' };
                    return {
                        fillColor: colors[worldData[f.properties.iso_a3]?.region] || '#cbd5e0',
                        weight: 1, color: "white", fillOpacity: 0.4
                    };
                },
                onEachFeature: (f, l) => {
                    l.on({
                        mouseover: (e) => {
                            e.target.setStyle({ fillOpacity: 0.8 });
                            display(f.properties.iso_a3);
                        },
                        mouseout: (e) => {
                            e.target.setStyle({ fillOpacity: 0.4 });
                            card.style.display = 'none';
                        }
                    });
                }
            }).addTo(map);

            statusText.innerText = "System: Online";
            setTimeout(() => { map.invalidateSize(); }, 400);

        } catch (e) {
            statusText.innerText = "System: Offline Data";
        }
    }

    function display(code) {
        const d = worldData[code];
        const lead = leaderData[code];
        if (d) {
            document.getElementById('name').innerText = d.name.common;
            document.getElementById('leader').innerText = lead ? lead.name : "Data Pending";
            document.getElementById('flag').src = d.flags.png;
            document.getElementById('pop').innerText = d.population.toLocaleString();
            card.style.display = 'block';
        }
    }

    // HYBRID SEARCH ENGINE (Local + Global)
    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.trim();
        clearTimeout(searchTimeout);

        if (term.length < 3) return;

        // Debounce to prevent hitting the API too many times per second
        searchTimeout = setTimeout(() => {
            let foundLocally = false;

            // 1. Search Locally (Countries/Leaders)
            geoJsonLayer.eachLayer(layer => {
                const code = (layer.feature.properties.iso_a3 || "").toUpperCase();
                const countryName = (layer.feature.properties.name || "").toLowerCase();
                const leadName = (leaderData[code]?.name || "").toLowerCase();

                if (countryName.includes(term.toLowerCase()) || leadName.includes(term.toLowerCase())) {
                    map.flyTo(layer.getBounds().getCenter(), 4);
                    display(code);
                    foundLocally = true;
                }
            });

            // 2. Search Globally (Cities, States, Oceans, Mountains)
            if (!foundLocally) {
                statusText.innerText = "System: Searching Globe...";
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(term)}&limit=1`)
                    .then(r => r.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            const result = data[0];
                            map.flyTo([result.lat, result.lon], 6);
                            statusText.innerText = "System: Online";
                        } else {
                            statusText.innerText = "System: Place Not Found";
                        }
                    });
            }
        }, 600);
    });

    window.onload = boot;
</script>
</body>
</html>

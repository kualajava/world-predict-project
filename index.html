<script>
    // version-tag: v1.0.7 - Data Merger Mode
    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([25, 0], 2.3);
    let worldData = {};
    let leaderData = {};

    // STEP 1: Fetch your private CSV leaders
    async function init() {
        const leaderRes = await fetch('leaders.csv');
        const csvText = await leaderRes.text();
        
        // Simple CSV parser
        csvText.split('\n').slice(1).forEach(line => {
            const [code, leader, title] = line.split(',');
            if(code) leaderData[code.trim()] = { leader, title };
        });

        // STEP 2: Fetch Live Country Data
        const liveRes = await fetch('https://restcountries.com/v3.1/all?fields=name,cca3,flags,population,currencies');
        const liveData = await liveRes.json();
        liveData.forEach(c => { worldData[c.cca3] = c; });

        loadMap();
    }

    function loadMap() {
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(res => res.json())
            .then(geoData => {
                L.geoJSON(geoData, {
                    style: { fillColor: "#1a1f26", weight: 1, color: '#4a5568', fillOpacity: 0.7 },
                    onEachFeature: function (feature, layer) {
                        const code = feature.properties.iso_a3;
                        const live = worldData[code];
                        const private = leaderData[code];

                        layer.on('click', () => {
                            if (live) {
                                const pop = live.population.toLocaleString();
                                const curr = Object.keys(live.currencies)[0];
                                const leader = private ? private.leader : "Data Pending";
                                const title = private ? private.title : "Leader";
                                
                                layer.bindPopup(`
                                    <div class="popup-content">
                                        <img src="${live.flags.png}" width="80" style="border-radius:4px">
                                        <h2 style="margin:10px 0">${live.name.common}</h2>
                                        <p><strong>${title}:</strong> ${leader}</p>
                                        <hr style="border:0; border-top:1px solid #eee">
                                        <p>👥 Pop: <strong>${pop}</strong></p>
                                        <p>💰 Currency: <strong>${curr}</strong></p>
                                    </div>
                                `).openPopup();
                            }
                        });
                        
                        layer.on({
                            mouseover: (e) => e.target.setStyle({ fillOpacity: 1, fillColor: "#3182ce" }),
                            mouseout: (e) => e.target.setStyle({ fillColor: "#1a1f26", fillOpacity: 0.7 })
                        });
                    }
                }).addTo(map);
            });
    }

    init();
</script>

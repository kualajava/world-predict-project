<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Atlas | v2.3.4-Fixed</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #020617; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* Map Layer */
        #map { position: absolute; top: 32px; bottom: 0; left: 0; right: 0; z-index: 1; background: #020617; }
        .map-dimmed { opacity: 0.3; filter: grayscale(0.7) blur(1px); pointer-events: none; }

        /* Left Intel Panel - BOOSTED Z-INDEX */
        #intel-panel { 
            position: fixed; 
            top: 85px; 
            left: 20px; 
            width: 350px; 
            max-height: 75vh; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 12px; 
            color: white; 
            display: none; /* Controlled by JS */
            flex-direction: column; 
            z-index: 99999 !important; /* Above everything */
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        /* Right Hover Card */
        #hover-card { 
            position: fixed; 
            top: 85px; 
            right: 20px; 
            width: 280px; 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            display: none; 
            z-index: 99998; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #ticker-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 32px; background: #0f172a; z-index: 100000; display: flex; align-items: center; border-bottom: 1px solid #1e293b; }
        .intel-badge { background: #facc15; border: 2px solid #000; border-radius: 50%; color: #000; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .stat-row { display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; padding: 5px 0; font-size: 11px; }
        .stat-val { font-weight: 700; color: #0f172a; }
        #log { position: fixed; bottom: 20px; left: 20px; z-index: 100000; background: #000; color: #4ade80; padding: 5px 12px; font-size: 10px; border-radius: 4px; border: 1px solid #334155; }
    </style>
</head>
<body>

<div id="ticker-wrap">
    <div style="background:#ef4444; color:white; padding:0 15px; height:100%; display:flex; align-items:center; font-size:10px; font-weight:900;">LIVE FEED</div>
    <div id="ticker-container" style="flex-grow:1; overflow:hidden; position:relative; height:100%;"><div id="ticker-content" style="white-space:nowrap; position:absolute; left:0; color:#94a3b8; font-size:11px; line-height:32px;"></div></div>
</div>

<div id="log">Status: Initializing...</div>
<div id="map"></div>

<div id="hover-card">
    <button onclick="closeIntel()" style="position:absolute; top:10px; right:10px; cursor:pointer; border:none; background:#f1f5f9; border-radius:50%; width:20px; height:20px;">✕</button>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <img src="" id="card-flag" style="width:30px; border:1px solid #eee;">
        <a href="" id="card-name-link" target="_blank" style="font-weight:800; color:#2563eb; text-decoration:none;"></a>
    </div>
    <div class="stat-row"><span>Capital</span><span class="stat-val" id="card-cap"></span></div>
    <div class="stat-row"><span>Leader</span><span class="stat-val" id="card-leader"></span></div>
    <div class="stat-row"><span>Population</span><span class="stat-val" id="card-pop"></span></div>
    <div style="margin-top:10px; padding-top:5px; border-top:2px solid #f1f5f9; font-size:9px; color:#94a3b8; font-weight:800;">ECONOMY</div>
    <div class="stat-row"><span>GDP</span><span class="stat-val" id="card-gdp"></span></div>
    <div class="stat-row"><span>Inflation</span><span class="stat-val" id="card-inf"></span></div>
</div>

<div id="intel-panel">
    <div style="padding:15px; background:#1e293b; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155;">
        <b id="intel-title" style="color:#facc15; font-size:12px; text-transform:uppercase;">ACTIVITY FEED</b>
        <button onclick="closeIntel()" style="background:none; border:none; color:white; cursor:pointer; font-size:16px;">✕</button>
    </div>
    <div id="intel-body" style="overflow-y:auto; padding:5px;"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const lb = document.getElementById('log');
    let map, geoLayer, isLocked = false;
    let predictions = [], worldData = {}, leaderData = {};
    let tickerPos = 0;

    const manualCoords = { "Russia": [55.75, 37.61], "United Kingdom": [51.50, -0.12], "USA": [38.89, -77.03] };

    function initMap() {
        map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.7 }).addTo(map);
        fetchData();
    }

    async function fetchData() {
        try {
            const ts = Date.now();
            // Geography
            fetch(`https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson`).then(r => r.json()).then(data => {
                geoLayer = L.geoJSON(data, {
                    style: { fillOpacity: 0, weight: 1, color: "rgba(255,255,255,0.1)" },
                    onEachFeature: (f, layer) => {
                        layer.on({
                            mouseover: () => { if(!isLocked) { updateHover(f.properties.name, f.properties.iso_a3); showIntel(f.properties.name, false); }},
                            mouseout: () => { if(!isLocked) hideUI(); },
                            click: (e) => { L.DomEvent.stopPropagation(e); jumpTo(f.properties.name, f.properties.iso_a3); }
                        });
                    }
                }).addTo(map);
            });

            // Predictions CSV
            const pRes = await fetch(`predictions.csv?v=${ts}`);
            const pTxt = await pRes.text();
            predictions = pTxt.split('\n').slice(1).filter(l => l.trim() !== "").map(line => {
                const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { "Country/Region": v[1]?.replace(/"/g, '').trim(), "Prediction": v[2]?.replace(/"/g, '').trim(), "Date": v[0] };
            });

            // RestCountries
            fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,population,capital,maps`).then(r => r.json()).then(data => {
                data.forEach(c => worldData[c.cca3] = c);
                drawHeatBadges();
            });

            // Leaders CSV
            fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(t => {
                t.split('\n').slice(1).forEach(row => {
                    const p = row.split(',');
                    if(p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
                });
            });

            runTicker();
            lb.innerText = "Status: Operational (v2.3.4)";
        } catch (e) { lb.innerText = "Status: Data Error"; }
    }

    function drawHeatBadges() {
        if(!geoLayer) return;
        geoLayer.eachLayer(layer => {
            const n = layer.feature.properties.name;
            const m = predictions.filter(p => p["Country/Region"]?.toLowerCase() === n.toLowerCase());
            if (m.length > 0) {
                L.marker(manualCoords[n] || layer.getBounds().getCenter(), { 
                    icon: L.divIcon({ className: '', html: `<div class="intel-badge">${m.length}</div>`, iconSize: [22, 22] }),
                    zIndexOffset: 1000
                }).addTo(map).on('click', (e) => { L.DomEvent.stopPropagation(e); jumpTo(n, layer.feature.properties.iso_a3); });
            }
        });
    }

    async function fetchEconomy(iso) {
        if (!iso) return;
        const indicators = { gdp: "NY.GDP.MKTP.CD", inf: "FP.CPI.TOTL.ZG" };
        for (const [key, id] of Object.entries(indicators)) {
            try {
                const res = await fetch(`https://api.worldbank.org/v2/country/${iso}/indicator/${id}?format=json&per_page=1&date=2021:2024`);
                const data = await res.json();
                if (data[1] && data[1][0]) {
                    let val = data[1][0].value;
                    document.getElementById(`card-${key}`).innerText = (key === 'gdp') ? "$" + (val >= 1e12 ? (val/1e12).toFixed(1) + "T" : (val/1e9).toFixed(1) + "B") : val.toFixed(1) + "%";
                } else { document.getElementById(`card-${key}`).innerText = "N/A"; }
            } catch (e) { document.getElementById(`card-${key}`).innerText = "ERR"; }
        }
    }

    function updateHover(name, code) {
        const d = worldData[code];
        document.getElementById('card-name-link').innerText = d ? d.name.common : name;
        document.getElementById('card-name-link').href = d?.maps?.googleMaps || "#";
        document.getElementById('card-cap').innerText = d?.capital ? d.capital[0] : "N/A";
        document.getElementById('card-leader').innerText = leaderData[code]?.name || "N/A";
        document.getElementById('card-pop').innerText = d ? d.population.toLocaleString() : "N/A";
        document.getElementById('card-flag').src = d?.flags?.png || "";
        document.getElementById('hover-card').style.display = 'block';
        fetchEconomy(code);
    }

    function jumpTo(name, iso) {
        isLocked = true;
        document.getElementById('map').classList.add('map-dimmed');
        let center = manualCoords[name] || [20,0];
        geoLayer.eachLayer(l => { if(l.feature.properties.name.toLowerCase() === name.toLowerCase()) center = manualCoords[name] || l.getBounds().getCenter(); });
        map.flyTo(center, 4.5);
        updateHover(name, iso);
        showIntel(name, true);
    }

    function showIntel(name, lock = false) {
        const m = predictions.filter(p => p["Country/Region"]?.toLowerCase() === name.toLowerCase());
        if (m.length === 0) return;
        const panel = document.getElementById('intel-panel');
        panel.style.display = 'flex'; // FORCE FLEX DISPLAY
        document.getElementById('intel-title').innerText = name;
        document.getElementById('intel-body').innerHTML = m.map(p => `
            <div style="padding:12px; border-bottom:1px solid #1e293b;">
                <div style="font-size:10px; color:#facc15; font-weight:800;">${p.Date}</div>
                <div style="font-size:13px; color:#cbd5e1; margin-top:4px;">${p.Prediction}</div>
            </div>`).join('');
        if(lock) isLocked = true;
    }

    function closeIntel() { 
        isLocked = false; 
        document.getElementById('hover-card').style.display='none'; 
        document.getElementById('intel-panel').style.display='none'; 
        document.getElementById('map').classList.remove('map-dimmed'); 
    }

    function hideUI() { 
        if(!isLocked) {
            document.getElementById('hover-card').style.display='none'; 
            document.getElementById('intel-panel').style.display='none'; 
        }
    }

    function runTicker() {
        const content = document.getElementById('ticker-content');
        content.innerHTML = predictions.slice(-10).reverse().map(p => `<span class="ticker-item" onclick="jumpTo('${p["Country/Region"]}', '')"><b>[${p.Date}]</b> ${p["Country/Region"]}</span>`).join('');
        setInterval(() => {
            tickerPos -= 1;
            if (Math.abs(tickerPos) >= content.scrollWidth) tickerPos = 500;
            content.style.transform = `translateX(${tickerPos}px)`;
        }, 30);
    }

    initMap();
</script>
</body>
</html>

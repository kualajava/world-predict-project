<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Atlas | v2.3.4-Intel</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #020617; overflow: hidden; font-family: -apple-system, sans-serif; }
        #map { position: absolute; top: 32px; bottom: 0; left: 0; right: 0; z-index: 1; background: #020617; transition: opacity 0.4s ease; }
        .map-dimmed { opacity: 0.35; filter: grayscale(0.5) contrast(1.1); }
        
        /* TICKER */
        #ticker-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 32px; background: #0f172a; border-bottom: 1px solid #334155; z-index: 10010; overflow: hidden; display: flex; align-items: center; }
        #ticker-label { background: #ef4444; color: white; padding: 0 15px; height: 100%; display: flex; align-items: center; font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 10011; }
        #ticker-container { flex-grow: 1; overflow: hidden; position: relative; height: 100%; display: flex; align-items: center; }
        #ticker-content { white-space: nowrap; position: absolute; left: 0; will-change: transform; transform: translate3d(0,0,0); color: #94a3b8; font-size: 11px; }
        .ticker-item { display: inline-block; margin-right: 60px; cursor: pointer; }

        /* RIGHT HOVER CARD */
        #hover-card { position: fixed; top: 85px; right: 15px; z-index: 9999; background: white; padding: 18px; border-radius: 12px; display: none; width: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #e2e8f0; }
        .card-close { position: absolute; top: 10px; right: 10px; background: #f1f5f9; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: #64748b; }
        .card-close:hover { background: #e2e8f0; color: #0f172a; }
        .stat-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; border-top: 1px solid #f1f5f9; padding-top: 6px; }
        .stat-label { color: #64748b; font-weight: 500; }
        .stat-val { color: #0f172a; font-weight: 700; }

        /* LEFT INTEL PANEL */
        #intel-panel { position: fixed; top: 85px; left: 15px; z-index: 10005; width: 340px; max-height: 70vh; background: rgba(15, 23, 42, 0.98); border-radius: 12px; border: 1px solid #475569; color: white; display: none; overflow: hidden; flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,0.7); backdrop-filter: blur(12px); }
        .intel-header { padding: 15px; background: #1e293b; border-bottom: 1px solid #475569; display: flex; justify-content: space-between; align-items: center; }
        #intel-body { overflow-y: auto; flex-grow: 1; }
        .pred-box { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        
        /* HEAT BADGES */
        .intel-badge { border: 2px solid #000; border-radius: 50%; color: #000; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #facc15; }
        .heat-high { background: #ef4444 !important; color: white !important; animation: badge-pulse 1.8s infinite; }
        @keyframes badge-pulse { 0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.7); } 100% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } }
        
        #log { position: fixed; bottom: 20px; left: 20px; z-index: 10002; background: #000; color: #4ade80; padding: 8px 15px; font-size: 11px; border-radius: 5px; font-family: monospace; border: 1px solid #334155; }
    </style>
</head>
<body>

<div id="ticker-wrap">
    <div id="ticker-label">Live Feed</div>
    <div id="ticker-container"><div id="ticker-content"></div></div>
</div>

<div id="log">Status: Connecting...</div>
<div id="map"></div>

<div id="hover-card">
    <button class="card-close" onclick="closeIntel()">✕</button>
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <img src="" id="card-flag" style="width:35px; border:1px solid #eee; border-radius: 2px;">
        <b id="card-name" style="font-size:16px; color:#1a202c;"></b>
    </div>
    <div class="stat-row"><span class="stat-label">Leader</span><span class="stat-val" id="card-leader"></span></div>
    <div class="stat-row"><span class="stat-label">Population</span><span class="stat-val" id="card-pop"></span></div>
    <div class="stat-row"><span class="stat-label">Currency</span><span class="stat-val" id="card-cur"></span></div>
    <div class="stat-row"><span class="stat-label">Region</span><span class="stat-val" id="card-reg"></span></div>
</div>

<div id="intel-panel">
    <div class="intel-header">
        <span id="intel-title" style="color:#facc15; font-weight:800; font-size:11px;">ACTIVITY FEED</span>
        <button onclick="closeIntel()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <div id="intel-body"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const lb = document.getElementById('log');
    let map, geoLayer, isLocked = false, currentCountry = "";
    let predictions = [], worldData = {}, leaderData = {};
    let tickerPos = 0, isPaused = false;

    const manualCoords = { "Russia": [55.75, 37.61], "United Kingdom": [51.50, -0.12], "USA": [38.89, -77.03] };

    window.onload = () => { if (typeof L !== 'undefined') initMap(); };

    function initMap() {
        map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 8 }).addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
        fetchData();
    }

    async function fetchData() {
        const ts = Date.now();
        try {
            // Fetch Geography
            const geoRes = await fetch(`https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson`);
            const geoData = await geoRes.json();
            geoLayer = L.geoJSON(geoData, {
                style: { fillOpacity: 0, weight: 1, color: "rgba(255,255,255,0.12)" },
                onEachFeature: (f, layer) => {
                    layer.on({
                        mouseover: () => { if(!isLocked) { updateHover(f.properties.name, f.properties.iso_a3); showIntel(f.properties.name, false); }},
                        mouseout: () => { if(!isLocked) hideUI(); },
                        click: (e) => { L.DomEvent.stopPropagation(e); jumpTo(f.properties.name, f.properties.iso_a3); }
                    });
                }
            }).addTo(map);

            // Fetch Predictions
            const predRes = await fetch(`predictions.csv?v=${ts}`);
            const txt = await predRes.text();
            const lines = txt.split('\n');
            const h = lines[0].split(',').map(x => x.trim());
            predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const o = {}; h.forEach((key, i) => o[key] = v[i]?.replace(/"/g, '').trim() || "");
                return o;
            });

            // Fetch Leader CSV
            fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(t => {
                t.split('\n').slice(1).forEach(row => {
                    const p = row.split(',');
                    if(p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
                });
            });

            // Fetch Economic/Global Data
            fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,population,currencies,region`).then(r => r.json()).then(data => {
                data.forEach(c => worldData[c.cca3] = c);
            });

            drawHeatBadges();
            runTicker();
            lb.innerText = "Status: Operational (v2.3.4)";
        } catch (e) { lb.innerText = "Status: Data Link Error"; }
    }

    function drawHeatBadges() {
        geoLayer.eachLayer(layer => {
            const n = layer.feature.properties.name;
            const matches = predictions.filter(p => p["Country/Region"]?.toLowerCase() === n.toLowerCase());
            if (matches.length > 0) {
                let pos = manualCoords[n] || layer.getBounds().getCenter();
                let heat = matches.length >= 10 ? "heat-high" : "heat-low";
                L.marker(pos, { 
                    icon: L.divIcon({ className: '', html: `<div class="intel-badge ${heat}">${matches.length}</div>`, iconSize: [22, 22] }) 
                }).addTo(map).on('click', (e) => { L.DomEvent.stopPropagation(e); jumpTo(n, layer.feature.properties.iso_a3); });
            }
        });
    }

    function updateHover(name, code) {
        const d = worldData[code];
        document.getElementById('card-name').innerText = d ? d.name.common : name;
        document.getElementById('card-leader').innerText = leaderData[code]?.name || "N/A";
        
        // Dynamic Economic Data
        document.getElementById('card-pop').innerText = d ? d.population.toLocaleString() : "N/A";
        
        if (d && d.currencies) {
            const cKey = Object.keys(d.currencies)[0];
            document.getElementById('card-cur').innerText = `${cKey} (${d.currencies[cKey].symbol})`;
        } else {
            document.getElementById('card-cur').innerText = "N/A";
        }
        
        document.getElementById('card-reg').innerText = d ? d.region : "N/A";

        const fl = document.getElementById('card-flag');
        fl.src = d?.flags?.png || ""; fl.style.display = d?.flags ? 'block' : 'none';
        document.getElementById('hover-card').style.display = 'block';
    }

    function jumpTo(name, iso) {
        if (isLocked && currentCountry === name) { closeIntel(); return; }
        isLocked = true; currentCountry = name;
        document.getElementById('map').classList.add('map-dimmed');
        let center = manualCoords[name] || [20,0];
        let foundIso = iso;
        geoLayer.eachLayer(l => { 
            if(l.feature.properties.name.toLowerCase() === name.toLowerCase()) {
                if(!manualCoords[name]) center = l.getBounds().getCenter();
                if(!foundIso) foundIso = l.feature.properties.iso_a3;
            }
        });
        map.flyTo(center, 4.5);
        updateHover(name, foundIso);
        showIntel(name, true);
    }

    function runTicker() {
        const content = document.getElementById('ticker-content');
        const recent = predictions.slice(-10).reverse();
        content.innerHTML = recent.map(p => `<span class="ticker-item" onclick="jumpTo('${p["Country/Region"]}', '')"><b>[${p["Date of Premonition"]}]</b> ${p["Country/Region"]}</span>`).join('') + " &nbsp; ";
        requestAnimationFrame(animate);
    }

    function animate() {
        if (!isPaused) {
            tickerPos -= 1;
            const content = document.getElementById('ticker-content');
            if (content && Math.abs(tickerPos) >= content.scrollWidth / 2) tickerPos = 0;
            if (content) content.style.transform = `translate3d(${tickerPos}px, 0, 0)`;
        }
        requestAnimationFrame(animate);
    }

    function showIntel(name, lock = false) {
        const matches = predictions.filter(p => p["Country/Region"]?.toLowerCase() === name.toLowerCase());
        if (matches.length === 0) return;
        document.getElementById('intel-title').innerText = `${name.toUpperCase()} FEED`;
        document.getElementById('intel-body').innerHTML = matches.map(p => `<div class="pred-box"><div style="font-size:10px; color:#94a3b8; font-weight:800; margin-bottom:4px;">${p["Date of Premonition"]}</div><div class="pred-text">${p["Prediction Description"]}</div></div>`).join('');
        document.getElementById('intel-panel').style.display = 'flex';
        if (lock) isLocked = true;
    }

    function closeIntel() { isLocked = false; currentCountry = ""; hideUI(); }
    function hideUI() { 
        document.getElementById('hover-card').style.display='none'; 
        document.getElementById('intel-panel').style.display='none'; 
        document.getElementById('map').classList.remove('map-dimmed'); 
    }
</script>
</body>
</html>

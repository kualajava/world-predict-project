<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Atlas | v2.3.8</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        #map { position: absolute; top: 64px; bottom: 0; left: 0; right: 0; z-index: 1; }
        .map-dimmed { opacity: 0.2; filter: grayscale(1) blur(3px); pointer-events: none; }

        /* THE PANEL - v2.3.8 */
        #intel-panel { 
            position: fixed !important; 
            top: 80px !important; 
            left: 20px !important; 
            width: 380px !important; 
            height: 70vh !important;
            background: #0f172a !important; 
            color: #fff !important; 
            display: none; 
            flex-direction: column; 
            z-index: 999999 !important; 
            border: 2px solid #facc15;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            overflow: hidden;
        }

        #hover-card { position: fixed; top: 80px; right: 20px; width: 300px; background: white; border-radius: 12px; padding: 15px; display: none; z-index: 999998; border: 1px solid #ddd; }
        .heat-badge { background: #facc15; border: 2px solid #000; border-radius: 50%; color: #000; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        #ticker-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 32px; background: #0f172a; z-index: 1000000; border-bottom: 1px solid #334155; }
        #debug-bar { position: fixed; top: 32px; left: 0; width: 100%; height: 22px; background: #ef4444; color: white; font-size: 10px; line-height: 22px; padding-left: 20px; z-index: 1000000; font-weight: bold; text-transform: uppercase; }
        #ver-tag { position: fixed; bottom: 10px; right: 10px; z-index: 1000000; background: #334155; color: white; padding: 4px 8px; font-size: 10px; border-radius: 4px; }
        .stat-row { display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; padding: 4px 0; font-size: 11px; }
    </style>
</head>
<body>

<div id="ver-tag">BUILD v2.3.8</div>
<div id="ticker-wrap"><div id="ticker-content" style="color:#94a3b8; font-size:11px; line-height:32px; padding-left:20px;">SYSTEM LIVE</div></div>
<div id="debug-bar">DEBUG: Loading Files...</div>

<div id="intel-panel">
    <div style="padding:15px; background:#1e293b; display:flex; justify-content:space-between; align-items:center;">
        <b id="intel-title" style="color:#facc15;">ACTIVITY FEED</b>
        <button onclick="closeIntel()" style="background:#ef4444; color:white; border:none; padding:4px 10px; border-radius:4px; cursor:pointer;">✕</button>
    </div>
    <div id="intel-body" style="overflow-y:auto; flex-grow:1; padding:15px; background:#0f172a;"></div>
</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <img src="" id="card-flag" style="width:30px;">
        <b id="card-name" style="font-size:18px; color:#2563eb;"></b>
    </div>
    <div class="stat-row"><span>Capital</span><b id="card-cap"></b></div>
    <div class="stat-row"><span>Leader</span><b id="card-leader"></b></div>
    <div class="stat-row"><span>GDP</span><b id="card-gdp">--</b></div>
    <div class="stat-row"><span>Inflation</span><b id="card-inf">--</b></div>
    <button onclick="closeIntel()" style="width:100%; margin-top:10px; background:#f1f5f9; border:none; padding:5px; border-radius:4px; cursor:pointer;">CLOSE</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, geoLayer, isLocked = false, predictions = [], worldData = {}, leaderData = {};

    function initMap() {
        map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.7 }).addTo(map);
        loadData();
    }

    async function loadData() {
        const ts = Date.now();
        try {
            // 1. Geography
            const gRes = await fetch(`https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson`);
            const gData = await gRes.json();
            geoLayer = L.geoJSON(gData, {
                style: { fillOpacity: 0, weight: 1.5, color: "rgba(255,255,255,0.2)" },
                onEachFeature: (f, layer) => {
                    layer.on({
                        mouseover: (e) => { if(!isLocked) { e.target.setStyle({weight:3, color:'#facc15'}); updateUI(f.properties.name, f.properties.iso_a3); }},
                        mouseout: (e) => { if(!isLocked) { geoLayer.resetStyle(e.target); hideUI(); }},
                        click: (e) => { L.DomEvent.stopPropagation(e); doLock(f.properties.name, f.properties.iso_a3); }
                    });
                }
            }).addTo(map);

            // 2. Predictions
            const pRes = await fetch(`predictions.csv?v=${ts}`);
            const pTxt = await pRes.text();
            predictions = pTxt.split('\n').slice(1).filter(l => l.trim() !== "").map(line => {
                const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { country: v[1]?.replace(/"/g, '').trim(), text: v[2]?.replace(/"/g, '').trim(), date: v[0] };
            });
            document.getElementById('debug-bar').innerText = `DEBUG: Loaded ${predictions.length} predictions | CSV Link Active`;

            // 3. Leaders
            fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(t => {
                t.split('\n').slice(1).forEach(row => {
                    const p = row.split(',');
                    if(p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
                });
            });

            // 4. Icons & Meta
            fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,capital`).then(r => r.json()).then(data => {
                data.forEach(c => worldData[c.cca3] = c);
                drawIcons();
            });

        } catch (e) { document.getElementById('debug-bar').innerText = "DEBUG: DATA FETCH ERROR"; }
    }

    function drawIcons() {
        geoLayer.eachLayer(layer => {
            const name = layer.feature.properties.name;
            const count = predictions.filter(p => p.country?.toLowerCase().trim() === name.toLowerCase().trim()).length;
            if (count > 0) {
                L.marker(layer.getBounds().getCenter(), { 
                    icon: L.divIcon({ className: 'heat-badge', html: count, iconSize: [22, 22] }) 
                }).addTo(map).on('click', (e) => { L.DomEvent.stopPropagation(e); doLock(name, layer.feature.properties.iso_a3); });
            }
        });
    }

    function updateUI(name, iso) {
        const d = worldData[iso];
        const matches = predictions.filter(p => p.country?.toLowerCase().trim() === name.toLowerCase().trim());
        
        document.getElementById('card-name').innerText = name;
        document.getElementById('card-cap').innerText = d?.capital ? d.capital[0] : "--";
        document.getElementById('card-leader').innerText = leaderData[iso]?.name || "--";
        document.getElementById('card-flag').src = d?.flags?.png || "";
        document.getElementById('hover-card').style.display = 'block';
        
        fetchEco(iso);

        if (matches.length > 0) {
            document.getElementById('intel-panel').style.display = 'flex';
            document.getElementById('intel-title').innerText = name.toUpperCase() + " FEED";
            document.getElementById('intel-body').innerHTML = matches.map(p => `
                <div style="margin-bottom:15px; border-bottom:1px solid #334155; padding-bottom:10px;">
                    <div style="color:#facc15; font-size:10px; font-weight:bold;">${p.date}</div>
                    <div style="font-size:14px; color:#e2e8f0; margin-top:5px;">${p.text}</div>
                </div>
            `).join('');
        } else { document.getElementById('intel-panel').style.display = 'none'; }
    }

    async function fetchEco(iso) {
        if(!iso) return;
        const res = await fetch(`https://api.worldbank.org/v2/country/${iso}/indicator/NY.GDP.MKTP.CD;FP.CPI.TOTL.ZG?format=json&per_page=2&date=2021:2024`);
        const data = await res.json();
        if(data[1]) {
            data[1].forEach(ind => {
                if(ind.indicator.id === "NY.GDP.MKTP.CD") document.getElementById('card-gdp').innerText = ind.value ? "$" + (ind.value/1e12).toFixed(1) + "T" : "N/A";
                if(ind.indicator.id === "FP.CPI.TOTL.ZG") document.getElementById('card-inf').innerText = ind.value ? ind.value.toFixed(1) + "%" : "N/A";
            });
        }
    }

    function doLock(n, i) { isLocked = true; document.getElementById('map').classList.add('map-dimmed'); updateUI(n, i); }
    function closeIntel() { isLocked = false; document.getElementById('map').classList.remove('map-dimmed'); hideUI(); }
    function hideUI() { document.getElementById('intel-panel').style.display = 'none'; document.getElementById('hover-card').style.display = 'none'; }

    initMap();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas | v2.2.4</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #aad3df; }

        /* Counter Badges */
        .intel-counter {
            background: #f6e05e; border: 2px solid #1a202c; border-radius: 50%;
            color: #1a202c; font-weight: 800; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 12px rgba(246, 224, 94, 0.9); cursor: pointer;
            transition: transform 0.2s;
        }
        .intel-counter:hover { transform: scale(1.3); z-index: 999!important; background: white; }

        /* Left Panel */
        #intel-panel {
            position: fixed; top: 85px; left: 20px; z-index: 9999;
            width: 350px; max-height: calc(100vh - 150px);
            background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
            color: white; display: none; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .intel-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: #1e293b; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; z-index: 11; }
        .prediction-entry { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .pred-meta { font-size: 10px; color: #94a3b8; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .pred-cat { color: #68d391; font-weight: bold; background: rgba(104,211,145,0.1); padding: 2px 5px; border-radius: 3px; }
        .pred-desc { font-size: 13px; line-height: 1.6; color: #f1f5f9; }

        #status-bar { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: rgba(0,0,0,0.8); color: #00ff00; padding: 8px 12px; font-size: 11px; border-radius: 6px; font-family: monospace; }
        #hover-card { position: fixed; top: 20px; right: 20px; z-index: 9999; width: 240px; background: white; border-radius: 12px; padding: 15px; display: none; border: 1px solid #eee; pointer-events: none; }
        #close-intel { background: rgba(255,255,255,0.1); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="status-bar">Atlas: System Live</div>

<div id="intel-panel">
    <div class="intel-header">
        <div id="intel-country-name" style="font-size:13px; font-weight:800; color:#f6e05e; text-transform:uppercase;">Intelligence Feed</div>
        <button id="close-intel">✕</button>
    </div>
    <div id="intel-content"></div>
</div>

<div id="hover-card">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <img src="" id="flag" style="width:35px; height:24px; border:1px solid #ddd; object-fit:cover;">
        <h2 id="name" style="font-size:16px; margin:0; color:#1a202c;"></h2>
    </div>
    <div id="leader" style="font-size:14px; font-weight:bold; color:#3182ce;"></div>
</div>

<div id="map"></div>

<script>
    const card = document.getElementById('hover-card');
    const intelPanel = document.getElementById('intel-panel');
    const intelContent = document.getElementById('intel-content');
    const intelTitle = document.getElementById('intel-country-name');
    
    let worldData = {}, leaderData = {}, predictions = [], isLocked = false;
    let geoLayer, markerLayer;

    // 1. BOOT MAP IMMEDIATELY
    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 0], 2.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    markerLayer = L.layerGroup().addTo(map);

    const ts = new Date().getTime();

    // 2. FAIL-SAFE DATA LOADING
    async function init() {
        // Load API info (Region/Flags)
        fetch(`https://restcountries.com/v3.1/all?fields=name,cca3,flags,region`)
            .then(r => r.json()).then(data => {
                data.forEach(c => worldData[c.cca3] = c);
                if(geoLayer) geoLayer.setStyle(f => getStyle(f));
            }).catch(() => console.warn("RestCountries API offline"));

        // Load Leaders
        fetch(`leaders.csv?v=${ts}`).then(r => r.text()).then(txt => {
            txt.split('\n').slice(1).forEach(row => {
                const p = row.split(',');
                if(p[0]) leaderData[p[0].trim().toUpperCase()] = { name: p[1] };
            });
        }).catch(() => console.warn("leaders.csv not found"));

        // Load Predictions
        fetch(`predictions.csv?v=${ts}`).then(r => r.text()).then(txt => {
            const lines = txt.split('\n');
            if (lines.length > 0) {
                const headers = lines[0].split(',');
                predictions = lines.slice(1).filter(l => l.trim() !== "").map(line => {
                    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((h, i) => obj[h.trim()] = values[i]?.replace(/"/g, '').trim() || "");
                    return obj;
                });
            }
            loadGeo(); // Load map once predictions are parsed
        }).catch(() => {
            console.warn("predictions.csv not found - loading empty map");
            loadGeo();
        });
    }

    function getStyle(f) {
        const colors = { 'Africa': '#f6ad55', 'Americas': '#68d391', 'Asia': '#fc8181', 'Europe': '#63b3ed', 'Oceania': '#f6e05e' };
        const reg = worldData[f.properties.iso_a3]?.region;
        return { fillColor: colors[reg] || '#cbd5e0', weight: 1, color: "white", fillOpacity: 0.6 };
    }

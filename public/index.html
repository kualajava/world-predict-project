<div id="ticker-wrap">
    <div id="ticker-label">WORLD FEED</div>
    <div id="ticker-scroll">
        <span id="ticker-content">INITIALIZING...</span>
        <span id="ticker-content-2"></span> 
    </div>
</div>

<div id="map"></div>
<div id="search-anchor"></div>

<div id="intel-panel">
    <div class="panel-header">
        <b id="intel-title">INTEL</b>
        <button onclick="closeUI()" class="close-x">✕</button>
    </div>
    <div id="intel-body" style="overflow-y:auto;"></div>
</div>

<div id="hover-card">
    <div class="panel-header">
        <b style="font-size: 10px; color: var(--accent);">DATA PROFILE</b>
        <button onclick="closeUI()" class="close-x">✕</button>
    </div>
    <div id="card-content" class="card-body">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <img src="" id="card-flag" style="width:30px;">
            <b id="card-name" style="color:var(--accent);"></b>
        </div>
        <div class="stat-row"><span>Leader</span><span class="stat-val" id="card-leader">--</span></div>
        <div class="stat-row"><span>Population</span><span class="stat-val" id="card-pop">--</span></div>
        <div class="stat-row"><span>GDP</span><span class="stat-val" id="card-gdp">--</span></div>
        <div class="stat-row"><span>Inflation</span><span class="stat-val" id="card-inf">--</span></div>
    </div>
</div>

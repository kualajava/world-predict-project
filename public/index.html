<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Atlas | v2.6.3 PROD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@latest/dist/geosearch.css" />
    <script src="https://unpkg.com/leaflet-geosearch@latest/dist/bundle.min.js"></script>

    <link rel="stylesheet" href="style.css?v=264">
    <script src="script.js?v=264"></script></head>
<body>

<div id="ticker-wrap">
    <div id="ticker-label">WORLD FEED</div>
    <div id="ticker-scroll">CONNECTING TO GLOBAL INTEL STREAM...</div>
</div>

<div id="map"></div>

<div id="intel-panel">
    <div class="intel-header">
        <b id="intel-title">INTEL</b>
        <button onclick="closeUI()" style="background:var(--danger); color:white; border:none; padding:4px 10px; border-radius:4px; cursor:pointer;">✕</button>
    </div>
    <div id="intel-body" class="intel-scroll"></div>
</div>

<div id="hover-card">
    <div id="card-content">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <img src="" id="card-flag" style="width:35px; border:1px solid #334155;">
            <b id="card-name" style="font-size:18px; color:var(--accent);"></b>
        </div>
        <div class="stat-row"><span class="stat-label">Currency</span><span class="stat-val" id="card-cur">--</span></div>
        <div class="stat-row"><span class="stat-label">Leader</span><span class="stat-val" id="card-leader">--</span></div>
        <div class="stat-row"><span class="stat-label">Population</span><span class="stat-val" id="card-pop">--</span></div>
        <div class="stat-row"><span class="stat-label">GDP (USD)</span><span class="stat-val" id="card-gdp">--</span></div>
        <div class="stat-row"><span class="stat-label">Inflation</span><span class="stat-val" id="card-inf">--</span></div>
        <button onclick="closeUI()" style="width:100%; margin-top:15px; padding:8px; background:#334155; color:white; border:none; border-radius:4px; cursor:pointer;">Unlock Map</button>
    </div>
</div>

<script src="script.js?v=263"></script>
</body>
</html>

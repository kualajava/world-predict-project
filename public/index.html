<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Atlas | Tactical Interface</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@latest/dist/geosearch.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-geosearch@latest/dist/bundle.min.js"></script>
</head>
<body>

<div id="ticker-wrap">
    <div id="ticker-label">WORLD FEED</div>
    <div id="ticker-scroll">
        <span id="ticker-content">CONNECTING TO SECURE DATA STREAM...</span>
        <span id="ticker-content-2"></span>
    </div>
</div>

<div id="map"></div>

<div id="intel-panel">
    <div class="intel-header">
        <b id="intel-title">INTEL</b>
        <button onclick="closeUI()" class="close-x">✕</button>
    </div>
    <div id="intel-body" class="intel-scroll"></div>
</div>

<div id="hover-card">
    <div class="card-header">
        <b style="font-size: 10px; color: var(--accent); letter-spacing: 1px;">DATA PROFILE</b>
        <button onclick="closeUI()" class="close-x">✕</button>
    </div>
    <div id="card-content" class="card-body">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
            <img src="" id="card-flag" style="width:30px; border:1px solid #334155;">
            <b id="card-name" style="font-size:16px; color:var(--accent);"></b>
        </div>
        <div class="stat-row"><span class="stat-label">Currency</span><span class="stat-val" id="card-cur">--</span></div>
        <div class="stat-row"><span class="stat-label">Leader</span><span class="stat-val" id="card-leader">--</span></div>
        <div class="stat-row"><span class="stat-label">Population</span><span class="stat-val" id="card-pop">--</span></div>
        <div class="stat-row"><span class="stat-label">GDP (USD)</span><span class="stat-val" id="card-gdp">--</span></div>
        <div class="stat-row"><span class="stat-label">Inflation</span><span class="stat-val" id="card-inf">--</span></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

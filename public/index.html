<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Atlas | v2.6.2 PROD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css?v=262">
</head>
<body>

<div id="ticker-wrap">
    <div id="ticker-label">WORLD FEED</div>
    <div id="ticker-scroll">PRODUCTION BUILD ACTIVE : v2.6.2 SECURE BRIDGE ONLINE : MONITORING GLOBAL INTEL...</div>
</div>

<div id="map"></div>

<div id="intel-panel">
    <div class="intel-header">
        <b id="intel-title">INTEL</b>
        <button onclick="closeUI()" style="background:var(--danger); color:white; border:none; padding:4px 10px; border-radius:4px; cursor:pointer;">✕</button>
    </div>
    <div id="intel-body" class="intel-scroll"></div>
</div>

<div id="hover-card">
    <div id="card-content">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <img src="" id="card-flag" style="width:35px; border:1px solid #eee;">
            <b id="card-name" style="font-size:18px; color:#1e40af;"></b>
        </div>
        <div class="stat-row"><span>Currency</span><span class="stat-val" id="card-cur">--</span></div>
        <div class="stat-row"><span>Leader</span><span class="stat-val" id="card-leader">--</span></div>
        <div class="stat-row"><span>Population</span><span class="stat-val" id="card-pop">--</span></div>
        <div class="stat-row"><span>GDP (USD)</span><span class="stat-val" id="card-gdp">--</span></div>
        <div class="stat-row"><span>Inflation</span><span class="stat-val" id="card-inf">--</span></div>
        <button onclick="closeUI()" style="width:100%; margin-top:15px; padding:10px; background:#f1f5f9; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">CLOSE</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js?v=262"></script>
</body>
</html>
